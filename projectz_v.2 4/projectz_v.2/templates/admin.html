<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Inter, sans-serif;
            background: linear-gradient(180deg,#eaf1f8,#f4f7fc);
            color: #1f3557;
            min-height: 100vh;
            padding: 22px 14px;
        }
        .container {
            max-width: 1360px;
            margin: 0 auto;
            background: linear-gradient(180deg,#fff,#f8fbff);
            border: 1px solid #d7e5f6;
            border-radius: 22px;
            box-shadow: 0 22px 42px rgba(69,104,148,.16);
            overflow: hidden;
        }
        .topbar {
            padding: 18px 20px 14px;
            border-bottom: 1px solid #e1ebf8;
            display: flex;
            gap: 14px;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .title-wrap h1 {
            font-size: 1.3rem;
            color: #23436d;
            margin-bottom: 4px;
            letter-spacing: .2px;
        }
        .welcome {
            color: #6b86aa;
            font-size: .85rem;
            font-weight: 600;
        }
        .top-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .pill-btn {
            text-decoration: none;
            border: 1px solid #d0e1f6;
            border-radius: 999px;
            padding: 9px 14px;
            font-size: .78rem;
            font-weight: 800;
            letter-spacing: .15px;
            cursor: pointer;
            transition: all .2s ease;
        }
        .view-btn {
            background: #f5f9ff;
            color: #39618f;
        }
        .view-btn:hover {
            background: #ebf3ff;
            border-color: #c1d7f2;
        }
        .logout-btn {
            background: linear-gradient(135deg,#ff6f66,#ff4f58);
            color: #fff;
            border-color: #f86f77;
        }
        .logout-btn:hover {
            filter: brightness(.96);
        }
        .main {
            padding: 16px 18px 18px;
        }
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .tab-btn {
            border: 1px solid #d3e3f7;
            background: #f4f8ff;
            color: #44678f;
            border-radius: 999px;
            padding: 9px 14px;
            cursor: pointer;
            font-size: .82rem;
            font-weight: 700;
        }
        .tab-btn.active {
            background: linear-gradient(135deg,#2f86ff,#1f6fdf);
            border-color: #2f86ff;
            color: #fff;
        }
        .section-card {
            border: 1px solid #dbe8f8;
            border-radius: 16px;
            background: #fff;
            padding: 14px;
        }
        .section-title {
            color: #29496f;
            font-size: .98rem;
            font-weight: 800;
            margin-bottom: 10px;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .table-wrap {
            width: 100%;
            overflow-x: auto;
            border: 1px solid #e2ecf8;
            border-radius: 12px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 940px;
            background: #fff;
        }
        th {
            background: #edf5ff;
            color: #315782;
            padding: 11px;
            text-align: left;
            font-size: .77rem;
            font-weight: 800;
            border-bottom: 1px solid #dce8f7;
        }
        td {
            padding: 11px;
            border-bottom: 1px solid #edf3fb;
            font-size: .8rem;
            color: #3a5d87;
            vertical-align: top;
        }
        tr:hover td {
            background: #fafcff;
        }
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 9px;
            border-radius: 999px;
            font-size: .7rem;
            font-weight: 800;
            border: 1px solid transparent;
        }
        .status-active {
            color: #1f7d53;
            background: #e9f9f0;
            border-color: #c0ead0;
        }
        .status-blocked {
            color: #aa3d43;
            background: #fff0f1;
            border-color: #f3c8cb;
        }
        .verified-badge,
        .unverified-badge {
            border-radius: 999px;
            padding: 4px 9px;
            font-size: .7rem;
            font-weight: 800;
            display: inline-block;
        }
        .verified-badge {
            background: #e8f8ef;
            color: #1f7d53;
            border: 1px solid #bde7cc;
        }
        .unverified-badge {
            background: #fff6e9;
            color: #966112;
            border: 1px solid #f4d7ad;
        }
        .action-btn {
            padding: 7px 10px;
            margin-right: 5px;
            margin-bottom: 5px;
            border: none;
            border-radius: 9px;
            cursor: pointer;
            font-size: .72rem;
            font-weight: 800;
        }
        .verify-btn {
            background: #e8f8ef;
            color: #1f7d53;
            border: 1px solid #bde7cc;
        }
        .verify-btn:hover {
            background: #ddf3e7;
        }
        .delete-btn {
            background: #fff0f1;
            color: #aa3d43;
            border: 1px solid #f3c8cb;
        }
        .delete-btn:hover {
            background: #ffe6e8;
        }
        .block-btn {
            padding: 7px 10px;
            border-radius: 9px;
            background: #fff6e9;
            color: #966112;
            border: 1px solid #f4d7ad;
            font-size: .72rem;
            font-weight: 800;
            cursor: pointer;
        }
        .block-btn:hover {
            background: #ffefdb;
        }
        .message {
            padding: 10px 12px;
            margin-bottom: 12px;
            border-radius: 10px;
            font-size: .8rem;
            font-weight: 700;
        }
        .success {
            background: #e8f8ef;
            color: #1f7d53;
            border: 1px solid #bde7cc;
        }
        .error {
            background: #fff0f1;
            color: #aa3d43;
            border: 1px solid #f3c8cb;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #6784aa;
            font-size: .85rem;
            font-weight: 600;
        }
        .image-preview {
            width: 64px;
            height: 64px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid #dce8f8;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="topbar">
            <div class="title-wrap">
                <h1>Admin Dashboard</h1>
                <p class="welcome">Welcome, <strong>{{ username }}</strong></p>
            </div>
            <div class="top-actions">
                <a class="pill-btn view-btn" href="{{ url_for('admin_user_view') }}">User View</a>
                <a class="pill-btn view-btn" href="{{ url_for('mobile_home') }}">Mobile View</a>
                <a class="pill-btn logout-btn" href="{{ url_for('logout') }}">Logout</a>
            </div>
        </header>

        <main class="main">
            <div id="message"></div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('users', this)">Users Management</button>
                <button class="tab-btn" onclick="switchTab('incidents', this)">Disaster Incidents</button>
            </div>

            <div id="users" class="tab-content active">
                <section class="section-card">
                    <h2 class="section-title">All Users</h2>
                    <div id="usersContainer" class="loading">Loading users...</div>
                </section>
            </div>

            <div id="incidents" class="tab-content">
                <section class="section-card">
                    <h2 class="section-title">Reported Disaster Incidents</h2>
                    <div id="incidentsContainer" class="loading">Loading incidents...</div>
                </section>
            </div>
        </main>
    </div>

    <script>
        // Switch between tabs
        function switchTab(tabName, tabButton) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // Show selected tab
            document.getElementById(tabName).classList.add('active');
            if (tabButton) {
                tabButton.classList.add('active');
            }
            
            // Load data for the tab
            if (tabName === 'users') {
                loadUsers();
            } else if (tabName === 'incidents') {
                loadIncidents();
            }
        }
        
        // Load users on page load
        document.addEventListener('DOMContentLoaded', loadUsers);

        function loadUsers() {
            fetch('{{ url_for("get_all_users") }}')
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        displayUsers(data.users);
                    } else {
                        showMessage(data.message || 'Failed to load users', 'error');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    showMessage('Error loading users', 'error');
                });
        }

        function displayUsers(users) {
            const container = document.getElementById('usersContainer');
            
            if (users.length === 0) {
                container.innerHTML = '<p style="padding: 20px;">No users found.</p>';
                return;
            }

            let html = `
                <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>User ID</th>
                            <th>Name</th>
                            <th>Username</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Created At</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            users.forEach(user => {
                const statusBadge = user.is_blocked
                    ? '<span class="status-pill status-blocked">Blocked</span>'
                    : '<span class="status-pill status-active">Active</span>';
                html += `
                    <tr>
                        <td>${user.user_id}</td>
                        <td>${user.name}</td>
                        <td>${user.username}</td>
                        <td>${user.email}</td>
                        <td>${user.phone}</td>
                        <td>${user.role}</td>
                        <td>${statusBadge}</td>
                        <td>${user.created_at}</td>
                        <td><button class="block-btn" onclick="blockUser(${user.user_id}, '${user.username}', ${user.is_blocked})">
                            ${user.is_blocked ? 'Unblock' : 'Block'}</button></td>
                    </tr>
                `;
            });

            html += `
                    </tbody>
                </table>
                </div>
            `;

            container.innerHTML = html;
        }

        function loadIncidents() {
            fetch('{{ url_for("get_all_incidents") }}')
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        displayIncidents(data.incidents);
                    } else {
                        showMessage(data.message || 'Failed to load incidents', 'error');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    showMessage('Error loading incidents', 'error');
                });
        }

        function displayIncidents(incidents) {
            const container = document.getElementById('incidentsContainer');
            
            if (incidents.length === 0) {
                container.innerHTML = '<p style="padding: 20px;">No incidents reported yet.</p>';
                return;
            }

            let html = `
                <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Reported By</th>
                            <th>Type</th>
                            <th>Location</th>
                            <th>Description</th>
                            <th>Verified</th>
                            <th>Image</th>
                            <th>Reported At</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            incidents.forEach(incident => {
                const verifiedBadge = incident.is_verified 
                    ? '<span class="verified-badge\">[OK] Verified</span>'
                    : '<span class="unverified-badge\">[WARNING] Unverified</span>';
                
                const imageHtml = incident.image_url 
                    ? `<img src="${incident.image_url}" class="image-preview" alt="Incident image">`
                    : 'No image';
                const descriptionText = incident.description ? incident.description : '-';
                
                html += `
                    <tr>
                        <td>${incident.incident_id}</td>
                        <td>${incident.username}</td>
                        <td>${incident.incident_type}</td>
                        <td>${incident.location}</td>
                        <td>${descriptionText.length > 50 ? descriptionText.substring(0, 50) + '...' : descriptionText}</td>
                        <td>${verifiedBadge}</td>
                        <td>${imageHtml}</td>
                        <td>${incident.created_at}</td>
                        <td>
                            <button class="action-btn verify-btn" onclick="verifyIncident(${incident.incident_id})">
                                ${incident.is_verified ? 'Unverify' : 'Verify'}</button>
                            <button class="action-btn delete-btn" onclick="deleteIncident(${incident.incident_id}, '${incident.incident_type}')">Delete</button>
                        </td>
                    </tr>
                `;
            });

            html += `
                    </tbody>
                </table>
                </div>
            `;

            container.innerHTML = html;
        }

        function blockUser(userId, username, isCurrentlyBlocked) {
            const action = isCurrentlyBlocked ? 'unblock' : 'block';
            const message = isCurrentlyBlocked 
                ? `Are you sure you want to unblock user "${username}"?`
                : `Are you sure you want to block user "${username}"?`;
            
            if (confirm(message)) {
                fetch('{{ url_for("block_user") }}', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ user_id: userId })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        const msg = isCurrentlyBlocked 
                            ? `User "${username}" unblocked successfully`
                            : `User "${username}" blocked successfully`;
                        showMessage(msg, 'success');
                        setTimeout(loadUsers, 1500);
                    } else {
                        showMessage(data.message || 'Failed to update user', 'error');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    showMessage('Error updating user', 'error');
                });
            }
        }

        function verifyIncident(incidentId) {
            fetch('{{ url_for("verify_incident") }}', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ incident_id: incidentId })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showMessage('Incident status updated successfully', 'success');
                    setTimeout(loadIncidents, 1500);
                } else {
                    showMessage(data.message || 'Failed to update incident', 'error');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                showMessage('Error updating incident', 'error');
            });
        }

        function deleteIncident(incidentId, incidentType) {
            if (confirm(`Are you sure you want to delete this ${incidentType} incident? This action cannot be undone.`)) {
                fetch('{{ url_for("delete_incident") }}', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ incident_id: incidentId })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        showMessage('Incident deleted successfully', 'success');
                        setTimeout(loadIncidents, 1500);
                    } else {
                        showMessage(data.message || 'Failed to delete incident', 'error');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    showMessage('Error deleting incident', 'error');
                });
            }
        }

        function showMessage(message, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = message;
            messageDiv.className = `message ${type}`;
            setTimeout(() => {
                messageDiv.textContent = '';
                messageDiv.className = '';
            }, 5000);
        }
    </script>
</body>
</html>
