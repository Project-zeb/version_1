<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline • Disaster Guard SOS</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #eaf1f8, #f4f7fc);
      color: #1e1f24;
      padding: 24px;
      text-align: center;
    }
    .card {
      width: min(420px, 100%);
      background: #fff;
      border: 1px solid #dce7f3;
      border-radius: 20px;
      padding: 22px 18px;
      box-shadow: 0 14px 30px rgba(83, 112, 148, 0.16);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 1.35rem;
      color: #2b3f5f;
    }
    p {
      margin: 0;
      font-size: .95rem;
      line-height: 1.45;
      color: #5d6f8a;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>You're Offline</h1>
    <p>SOS page is available after first load. Keep cellular signal on to place calls or send SMS when possible.</p>
  </div>
</body>
</html>
