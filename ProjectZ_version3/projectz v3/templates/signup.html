<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Sign Up | Save India</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        :root {
            --phone:#f9f4f5;
            --text:#1e1f24;
            --muted:#9a9aa3;
            --line:#e8dcdf;
            --accent:#f05e67;
            --accent-deep:#e34f5a;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family:Inter,sans-serif;
            background:linear-gradient(180deg,#eaf1f8,#f4f7fc);
            min-height:100vh;
            display:grid;
            place-items:center;
            padding:20px 12px;
            color:var(--text);
        }

        .phone {
            width:min(100%,392px);
            height:min(840px,95vh);
            border-radius:34px;
            border:1px solid #d8e3ef;
            background:var(--phone);
            box-shadow:0 22px 50px rgba(96,126,163,.25);
            overflow:hidden;
            position:relative;
        }

        .status-notch {
            height:28px;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .notch {
            width:120px;
            height:28px;
            border-radius:0 0 16px 16px;
            background:#ebe3e5;
        }

        .app {
            height:calc(100% - 28px);
            padding:18px 16px 20px;
            display:grid;
            align-content:start;
            gap:14px;
            overflow:auto;
        }

        .brand {
            text-align:center;
            font-family:"Great Vibes",cursive;
            font-size:2.2rem;
            color:#c15361;
            letter-spacing:.3px;
            margin-bottom:4px;
        }

        .heading {
            text-align:center;
        }

        .heading h1 {
            font-size:1.9rem;
            margin-bottom:6px;
            letter-spacing:.2px;
        }

        .heading p {
            color:var(--muted);
            font-size:.9rem;
            line-height:1.5;
        }

        .panel {
            border:1px solid var(--line);
            background:#fff;
            border-radius:18px;
            padding:14px;
            display:grid;
            gap:10px;
            box-shadow:0 10px 20px rgba(145,125,132,.14);
        }

        .input-group { display:grid; gap:6px; }

        .input-group label {
            font-size:.78rem;
            color:#7c6f75;
            font-weight:700;
        }

        .input {
            width:100%;
            border:1px solid #eadde0;
            border-radius:12px;
            padding:11px 12px;
            outline:none;
            font-size:.88rem;
            color:#3a3840;
            background:#fff;
        }

        .input:focus {
            border-color:#ef9ea5;
            box-shadow:0 0 0 3px rgba(240,94,103,.12);
        }

        .primary-btn {
            width:100%;
            border:none;
            border-radius:12px;
            padding:11px 14px;
            color:#fff;
            background:linear-gradient(135deg,var(--accent),var(--accent-deep));
            font-size:.9rem;
            font-weight:800;
            letter-spacing:.2px;
            cursor:pointer;
            margin-top:4px;
        }

        .bottom {
            text-align:center;
            font-size:.8rem;
            color:#7a7277;
            line-height:1.5;
        }

        .bottom a {
            color:#b24c58;
            text-decoration:none;
            font-weight:700;
        }

        .msg {
            text-align:center;
            border:1px solid #f1cbcf;
            background:#fff2f3;
            color:#b14855;
            border-radius:10px;
            font-size:.77rem;
            font-weight:700;
            padding:8px 10px;
        }
    </style>
</head>

<body>
    <section class="phone">
        <div class="status-notch"><div class="notch"></div></div>

        <main class="app">
            <div class="brand">Alertify</div>

            <section class="heading">
                <h1>Create Account</h1>
                <p>Let's connect</p>
            </section>

            <form class="panel" action="{{ url_for('signup') }}" method="post">
                <div class="input-group">
                    <label for="name">Full Name</label>
                    <input type="text" class="input" name="name" id="name" 
                    
                    value="{{ user_info.name if user_info else '' }}"
                    
                    placeholder="Matrika Regmi" required />
                </div>

                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" class="input" name="username" id="username" 
                    value="{{ user_info.username if user_info else '' }}"
                    placeholder="matrika_regmi" required />
                </div>

                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" class="input" name="email" id="email" 
                    value="{{ user_info.email_id if user_info else '' }}"
                    placeholder="matrika@example.com" required />
                </div>

                <div class="input-group">
                    <label for="phone">Phone</label>
                    <input type="tel" class="input" name="phone" id="phone" 
                    value="{{ user_info.phone if user_info else '' }}"
                    placeholder="9800000000" required />
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" class="input" name="password" id="password"
                    value="{{ user_info.password if user_info else '' }}"
                     placeholder="Alertify@1234" required />
                </div>

                <div class="input-group">
                    <label for="role">Role</label>
                    <select class="input" name="role" id="role" required>
                        {% if user_info and user_info.email_id == "ayaansaifi2005@gmail.com" %}
                        <!-- <option value="">Role</option> -->
                        <option value="admin">Admin</option>
                        {% else %}
                         <option value="">Role</option>
                        <option value="user">User</option>
                        <option value="admin">Admin</option>
                        {% endif %}
                    </select>
                </div>

                <button type="submit" class="primary-btn">Sign Up</button>
            </form>

            {% if msg %}
            <p class="msg">{{ msg }}</p>
            {% endif %}

            <div class="bottom">
                Already have an account?
                <a href="{{ url_for('login') }}">Log In</a>
            </div>
        </main>
    </section>
</body>
</html>
