<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Live Disaster Output Check</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --phone:#f9f4f5; --line:#e8dcdf; --text:#1f2632; --muted:#7d8595; --accent:#ff5e66; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Inter,sans-serif; background:linear-gradient(180deg,#eaf1f8,#f4f7fc); min-height:100vh; display:grid; place-items:center; padding:20px 12px; color:var(--text); }
        .phone { width:min(100%,420px); height:min(900px,96vh); border-radius:30px; border:1px solid #d8e3ef; background:var(--phone); box-shadow:0 22px 50px rgba(96,126,163,.25); overflow:hidden; }
        .head { padding:14px; border-bottom:1px solid var(--line); background:#fff7f8; display:grid; gap:10px; }
        .head h1 { font-size:1.05rem; }
        .row { display:grid; grid-template-columns:1fr 90px 80px; gap:8px; }
        .row2 { display:grid; grid-template-columns:1fr 1fr 110px; gap:8px; }
        .row3 { display:grid; grid-template-columns:1fr auto; gap:8px; align-items:center; }
        .input, .select { border:1px solid #eadde0; border-radius:10px; padding:8px 10px; font-size:.8rem; background:#fff; outline:none; }
        .btn { border:none; border-radius:10px; background:linear-gradient(135deg,#ff6f66,#ff4f58); color:#fff; font-size:.78rem; font-weight:800; padding:9px 12px; cursor:pointer; }
        .btn.secondary { background:#fff; color:#b14d58; border:1px solid #efc8cd; }
        .meta { font-size:.72rem; color:var(--muted); font-weight:600; display:flex; justify-content:space-between; gap:10px; }
        .meta-left { display:flex; align-items:center; gap:8px; min-width:0; }
        .source-pill { border:1px solid #e6d8dc; border-radius:999px; padding:2px 8px; font-size:.64rem; font-weight:800; text-transform:uppercase; letter-spacing:.02em; white-space:nowrap; background:#fff; color:#8b5f69; }
        .source-pill.internal { border-color:#c9e5d1; color:#1f7a3b; background:#f0fff4; }
        .source-pill.fallback { border-color:#ecd9c5; color:#a24f1b; background:#fff7ed; }
        .source-pill.unknown { border-color:#e5e7eb; color:#64748b; background:#f8fafc; }
        .content { height:calc(100% - 126px); overflow:auto; padding:10px; display:grid; gap:8px; }
        .card { border:1px solid #e4dce1; border-radius:12px; background:#fff; padding:10px; display:grid; gap:6px; }
        .top { display:flex; justify-content:space-between; gap:8px; align-items:center; }
        .title { font-size:.87rem; font-weight:800; color:#2f3f5a; }
        .sev { border-radius:999px; padding:3px 8px; font-size:.66rem; font-weight:800; color:#fff; text-transform:uppercase; }
        .sev.red { background:#dc2626; }
        .sev.yellow { background:#ca8a04; }
        .sev.orange { background:#ea580c; }
        .sev.green { background:#16a34a; }
        .sev.default { background:#64748b; }
        .line { font-size:.74rem; color:#55627a; }
        .empty { border:1px dashed #d8cfd5; border-radius:12px; padding:14px; color:#7e6f77; font-size:.8rem; text-align:center; background:#fff; }
        .link { color:#b14d58; font-weight:700; text-decoration:none; font-size:.75rem; }
    </style>
</head>
<body>
    <section class="phone">
        <header class="head">
            <h1>Live Disaster Output Check</h1>
            <div class="row">
                <input id="stateInput" class="input" type="text" placeholder="India / Delhi / Kerala" value="India" />
                <input id="limitInput" class="input" type="number" min="10" max="500" value="80" />
                <button id="loadBtn" class="btn" type="button">Load</button>
            </div>
            <div class="row2">
                <select id="typeInput" class="select">
                    <option value="all">All Types</option>
                    <option value="Cyclonic">Cyclonic</option>
                    <option value="Landslide">Landslide</option>
                    <option value="Flood">Flood</option>
                    <option value="Earthquake">Earthquake</option>
                    <option value="Pre Fire">Pre Fire</option>
                    <option value="Fire">Fire</option>
                    <option value="Light Rain">Light Rain</option>
                    <option value="Moderate Rain">Moderate Rain</option>
                    <option value="Thunderstorm">Thunderstorm</option>
                    <option value="Heavy Rain">Heavy Rain</option>
                    <option value="Heat Wave">Heat Wave</option>
                </select>
                <select id="severityInput" class="select">
                    <option value="all">All Severity</option>
                    <option value="ALERT">ALERT</option>
                    <option value="WARNING">WARNING</option>
                    <option value="WATCH">WATCH</option>
                </select>
                <input id="dateInput" class="input" type="date" />
            </div>
            <div class="row3">
                <select id="policyInput" class="select" title="Data source policy">
                    <option value="live_only">Always Live</option>
                    <option value="auto_fallback">Auto Fallback</option>
                </select>
                <button id="clearBtn" class="btn secondary" type="button">Clear Filters</button>
            </div>
            <div class="meta">
                <div class="meta-left">
                    <span id="statusText">Waiting for data...</span>
                    <span id="sourceModeBadge" class="source-pill unknown">Source: --</span>
                </div>
                <a class="link" href="{{ url_for('mobile_home') }}">Back to Home</a>
            </div>
        </header>

        <main id="list" class="content"></main>
    </section>

    <script>
        const stateInput = document.getElementById('stateInput');
        const limitInput = document.getElementById('limitInput');
        const typeInput = document.getElementById('typeInput');
        const severityInput = document.getElementById('severityInput');
        const dateInput = document.getElementById('dateInput');
        const policyInput = document.getElementById('policyInput');
        const clearBtn = document.getElementById('clearBtn');
        const loadBtn = document.getElementById('loadBtn');
        const statusText = document.getElementById('statusText');
        const sourceModeBadge = document.getElementById('sourceModeBadge');
        const list = document.getElementById('list');

        const sevClass = (value) => {
            const s = String(value || '').toLowerCase();
            if (s === 'red') return 'red';
            if (s === 'yellow') return 'yellow';
            if (s === 'orange') return 'orange';
            if (s === 'green') return 'green';
            return 'default';
        };

        const prettyCoords = (lat, lon) => {
            if (typeof lat === 'number' && typeof lon === 'number' && Number.isFinite(lat) && Number.isFinite(lon)) {
                return `${lat.toFixed(4)}, ${lon.toFixed(4)}`;
            }
            return 'Not available';
        };

        const render = (alerts) => {
            if (!alerts.length) {
                list.innerHTML = '<div class="empty">No alerts found for this filter.</div>';
                return;
            }

            list.innerHTML = alerts.map((a) => `
                <article class="card">
                    <div class="top">
                        <div class="title">${a.type || 'Alert'}</div>
                        <span class="sev ${sevClass(a.severity_color)}">${a.severity || 'watch'}</span>
                    </div>
                    <div class="line"><strong>Area:</strong> ${a.area || '-'}</div>
                    <div class="line"><strong>Category:</strong> ${a.category || '-'}</div>
                    <div class="line"><strong>Source:</strong> ${a.source || '-'}</div>
                    <div class="line"><strong>Time:</strong> ${a.start_time || '-'} → ${a.end_time || '-'}</div>
                    <div class="line"><strong>Coords:</strong> ${prettyCoords(a.lat, a.lon)}</div>
                    <div class="line"><strong>ID:</strong> ${a.id || '-'}</div>
                </article>
            `).join('');
        };

        const setSourceMode = (modeValue) => {
            const mode = String(modeValue || '').toLowerCase();
            sourceModeBadge.className = 'source-pill unknown';

            if (mode === 'internal_api') {
                sourceModeBadge.className = 'source-pill internal';
                sourceModeBadge.textContent = 'Source: Internal API';
                return;
            }

            if (mode === 'file_fallback') {
                sourceModeBadge.className = 'source-pill fallback';
                sourceModeBadge.textContent = 'Source: File Fallback';
                return;
            }

            if (mode === 'internal_unavailable') {
                sourceModeBadge.className = 'source-pill fallback';
                sourceModeBadge.textContent = 'Source: Live Unavailable';
                return;
            }

            sourceModeBadge.textContent = 'Source: --';
        };

        const loadAlerts = async (allowAutoSwitch = true) => {
            const state = (stateInput.value || 'India').trim();
            const limit = Math.max(10, Math.min(500, Number(limitInput.value || 80)));
            const disasterType = (typeInput.value || 'all').trim();
            const severity = (severityInput.value || 'all').trim();
            const date = (dateInput.value || '').trim();
            const sourcePolicy = (policyInput.value || 'live_only').trim();
            localStorage.setItem('alertify_source_policy', sourcePolicy);
            statusText.textContent = 'Loading...';
            list.innerHTML = '';

            try {
                const query = new URLSearchParams({
                    state,
                    limit: String(limit),
                    disaster_type: disasterType,
                    severity,
                    scope: 'expanded',
                    source_policy: sourcePolicy
                });
                if (date) query.set('date', date);

                const response = await fetch(`/api/mobile/live-alerts?${query.toString()}`);
                const data = await response.json();
                if (data && data.success === false) {
                    setSourceMode(data.source_mode || 'internal_unavailable');
                    throw new Error(data.message || 'Live source unavailable');
                }
                const alerts = Array.isArray(data.alerts) ? data.alerts : [];
                render(alerts);
                setSourceMode(data.source_mode);
                const mappable = Number.isFinite(Number(data.mappable_count)) ? Number(data.mappable_count) : alerts.filter(a => typeof a.lat === 'number' && typeof a.lon === 'number').length;
                statusText.textContent = `${alerts.length} alerts (${mappable} with location) • generated ${data.generated_at || 'N/A'}`;
            } catch (error) {
                const sourcePolicy = (policyInput.value || 'live_only').trim();
                if (sourcePolicy === 'live_only' && allowAutoSwitch) {
                    policyInput.value = 'auto_fallback';
                    localStorage.setItem('alertify_source_policy', 'auto_fallback');
                    statusText.textContent = 'Live API unavailable • switched to Auto Fallback';
                    return loadAlerts(false);
                }

                if (sourcePolicy === 'live_only') {
                    list.innerHTML = '<div class="empty">Always Live mode is enabled, but live API is currently unavailable. Auto-switch failed; please retry.</div>';
                    setSourceMode('internal_unavailable');
                    statusText.textContent = 'Live API unavailable';
                } else {
                    list.innerHTML = '<div class="empty">Failed to fetch data from server.</div>';
                    setSourceMode('');
                    statusText.textContent = 'Request failed';
                }
            }
        };

        loadBtn.addEventListener('click', loadAlerts);
        stateInput.addEventListener('keydown', (event) => { if (event.key === 'Enter') loadAlerts(); });
        limitInput.addEventListener('keydown', (event) => { if (event.key === 'Enter') loadAlerts(); });
        typeInput.addEventListener('change', loadAlerts);
        severityInput.addEventListener('change', loadAlerts);
        dateInput.addEventListener('change', loadAlerts);
        policyInput.addEventListener('change', loadAlerts);

        clearBtn.addEventListener('click', () => {
            stateInput.value = 'India';
            limitInput.value = '80';
            typeInput.value = 'all';
            severityInput.value = 'all';
            dateInput.value = '';
            policyInput.value = localStorage.getItem('alertify_source_policy') || 'live_only';
            loadAlerts();
        });

        policyInput.value = localStorage.getItem('alertify_source_policy') || 'live_only';
        loadAlerts();
    </script>
</body>
</html>
