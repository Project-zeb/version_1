<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Inter, sans-serif;
            background: linear-gradient(180deg,#eaf1f8,#f4f7fc);
            color: #1f3557;
            min-height: 100vh;
            padding: 22px 14px;
        }
        .container {
            max-width: 1360px;
            margin: 0 auto;
            background: linear-gradient(180deg,#fff,#f8fbff);
            border: 1px solid #d7e5f6;
            border-radius: 22px;
            box-shadow: 0 22px 42px rgba(69,104,148,.16);
            overflow: hidden;
        }
        .topbar {
            padding: 18px 20px 14px;
            border-bottom: 1px solid #e1ebf8;
            display: flex;
            gap: 14px;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .title-wrap h1 {
            font-size: 1.3rem;
            color: #23436d;
            margin-bottom: 4px;
            letter-spacing: .2px;
        }
        .welcome {
            color: #6b86aa;
            font-size: .85rem;
            font-weight: 600;
        }
        .top-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .view-switch {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 8px 12px;
            border: 1px solid #c9dcf4;
            border-radius: 999px;
            background: linear-gradient(180deg,#f7fbff,#edf5ff);
            color: #496d97;
            font-size: .75rem;
            font-weight: 800;
            box-shadow: inset 0 1px 0 rgba(255,255,255,.8);
        }
        .switch-label {
            font-size: .72rem;
            color: #6c86a9;
            font-weight: 700;
            transition: color .2s ease;
        }
        .view-switch .switch-label.desktop {
            color: #2f5f92;
        }
        .view-switch.mobile-on .switch-label.desktop {
            color: #7f95b3;
        }
        .view-switch.mobile-on .switch-label.mobile {
            color: #2f7ee6;
        }
        .toggle-switch {
            position: relative;
            width: 66px;
            height: 30px;
            display: inline-block;
        }
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .toggle-slider {
            position: absolute;
            inset: 0;
            border-radius: 999px;
            background: linear-gradient(135deg,#3d5f8f,#2b4a73);
            border: 1px solid #6a89b0;
            transition: all .24s ease;
            cursor: pointer;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,.08), 0 3px 8px rgba(38,68,105,.2);
        }
        .toggle-slider::before {
            content: "";
            position: absolute;
            width: 24px;
            height: 24px;
            left: 2px;
            top: 2px;
            border-radius: 50%;
            background: linear-gradient(180deg,#ffffff,#e8f0fb);
            transition: transform .24s ease;
            box-shadow: 0 1px 6px rgba(13,36,68,.32);
        }
        .toggle-slider::after {
            content: "OFF";
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            font-size: .62rem;
            font-weight: 800;
            letter-spacing: .4px;
            color: rgba(228,239,255,.9);
        }
        .toggle-switch input:checked + .toggle-slider {
            background: linear-gradient(135deg,#3aa4ff,#2f86ff);
            border-color: #2f86ff;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,.15), 0 0 14px rgba(47,134,255,.38);
        }
        .toggle-switch input:checked + .toggle-slider::before {
            transform: translateX(36px);
        }
        .toggle-switch input:checked + .toggle-slider::after {
            content: "ON";
            right: 32px;
            color: rgba(255,255,255,.97);
        }
        .pill-btn {
            text-decoration: none;
            border: 1px solid #d0e1f6;
            border-radius: 999px;
            padding: 9px 14px;
            font-size: .78rem;
            font-weight: 800;
            letter-spacing: .15px;
            cursor: pointer;
            transition: all .2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        .view-btn {
            background: #f5f9ff;
            color: #39618f;
        }
        .view-btn:hover {
            background: #ebf3ff;
            border-color: #c1d7f2;
        }
        .logout-btn {
            background: linear-gradient(135deg,#ff6f66,#ff4f58);
            color: #fff;
            border-color: #f86f77;
        }
        .logout-btn:hover {
            filter: brightness(.96);
        }
        .main {
            padding: 16px 18px 18px;
        }
        .db-status {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 10px;
            padding: 8px 10px;
            border: 1px solid #d7e6f8;
            border-radius: 12px;
            background: #f7fbff;
        }
        .db-status-title {
            width: 100%;
            color: #355a86;
            font-size: .76rem;
            font-weight: 900;
            letter-spacing: .12px;
        }
        .db-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border-radius: 999px;
            border: 1px solid #cfe0f4;
            background: #f5f9ff;
            color: #355a86;
            padding: 6px 10px;
            font-size: .72rem;
            font-weight: 800;
            letter-spacing: .1px;
        }
        .db-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #9cb5d6;
            display: inline-block;
        }
        .db-dot.ok {
            background: #2dc98c;
            box-shadow: 0 0 0 4px rgba(45,201,140,.18);
        }
        .db-dot.fail {
            background: #ff6f66;
            box-shadow: 0 0 0 4px rgba(255,111,102,.15);
        }
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .mobile-sections-rail {
            display: block;
        }
        .tab-btn {
            border: 1px solid #d3e3f7;
            background: #f4f8ff;
            color: #44678f;
            border-radius: 999px;
            padding: 9px 14px;
            cursor: pointer;
            font-size: .82rem;
            font-weight: 700;
        }
        .tab-btn.active {
            background: linear-gradient(135deg,#2f86ff,#1f6fdf);
            border-color: #2f86ff;
            color: #fff;
        }
        .section-card {
            border: 1px solid #dbe8f8;
            border-radius: 16px;
            background: #fff;
            padding: 14px;
        }
        .section-title {
            color: #29496f;
            font-size: .98rem;
            font-weight: 800;
            margin-bottom: 10px;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .table-wrap {
            width: 100%;
            overflow-x: auto;
            border: 1px solid #e2ecf8;
            border-radius: 12px;
        }
        .desktop-view {
            display: block;
        }
        .mobile-view {
            display: none;
        }
        body.force-mobile-view .desktop-view {
            display: none;
        }
        body.force-mobile-view .mobile-view {
            display: grid;
            gap: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 940px;
            background: #fff;
        }
        th {
            background: #edf5ff;
            color: #315782;
            padding: 11px;
            text-align: left;
            font-size: .77rem;
            font-weight: 800;
            border-bottom: 1px solid #dce8f7;
        }
        td {
            padding: 11px;
            border-bottom: 1px solid #edf3fb;
            font-size: .8rem;
            color: #3a5d87;
            vertical-align: top;
        }
        tr:hover td {
            background: #fafcff;
        }
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 9px;
            border-radius: 999px;
            font-size: .7rem;
            font-weight: 800;
            border: 1px solid transparent;
        }
        .status-active {
            color: #1f7d53;
            background: #e9f9f0;
            border-color: #c0ead0;
        }
        .status-blocked {
            color: #aa3d43;
            background: #fff0f1;
            border-color: #f3c8cb;
        }
        .verified-badge,
        .unverified-badge {
            border-radius: 999px;
            padding: 4px 9px;
            font-size: .7rem;
            font-weight: 800;
            display: inline-block;
        }
        .verified-badge {
            background: #e8f8ef;
            color: #1f7d53;
            border: 1px solid #bde7cc;
        }
        .unverified-badge {
            background: #fff6e9;
            color: #966112;
            border: 1px solid #f4d7ad;
        }
        .action-btn {
            padding: 7px 10px;
            margin-right: 5px;
            margin-bottom: 5px;
            border: none;
            border-radius: 9px;
            cursor: pointer;
            font-size: .72rem;
            font-weight: 800;
        }
        .verify-btn {
            background: #e8f8ef;
            color: #1f7d53;
            border: 1px solid #bde7cc;
        }
        .verify-btn:hover {
            background: #ddf3e7;
        }
        .delete-btn {
            background: #fff0f1;
            color: #aa3d43;
            border: 1px solid #f3c8cb;
        }
        .delete-btn:hover {
            background: #ffe6e8;
        }
        .block-btn {
            padding: 7px 10px;
            border-radius: 9px;
            background: linear-gradient(135deg,#ff6f66,#ff4f58);
            color: #fff;
            border: 1px solid #f86f77;
            font-size: .72rem;
            font-weight: 800;
            cursor: pointer;
        }
        .block-btn:hover {
            filter: brightness(.96);
        }
        .message {
            padding: 10px 12px;
            margin-bottom: 12px;
            border-radius: 10px;
            font-size: .8rem;
            font-weight: 700;
        }
        .success {
            background: #e8f8ef;
            color: #1f7d53;
            border: 1px solid #bde7cc;
        }
        .error {
            background: #fff0f1;
            color: #aa3d43;
            border: 1px solid #f3c8cb;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #6784aa;
            font-size: .85rem;
            font-weight: 600;
        }
        .image-preview {
            width: 64px;
            height: 64px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid #dce8f8;
            cursor: pointer;
        }
        .mobile-card {
            border: 1px solid #dbe8f8;
            border-radius: 12px;
            padding: 12px;
            background: #fff;
        }
        .mobile-card h3 {
            font-size: .92rem;
            color: #2f5179;
            margin-bottom: 8px;
        }
        .mobile-row {
            display: grid;
            grid-template-columns: 88px 1fr;
            align-items: start;
            column-gap: 8px;
            margin-bottom: 7px;
            font-size: .8rem;
            line-height: 1.4;
            color: #3a5d87;
        }
        .mobile-label {
            font-weight: 800;
            color: #486d98;
        }
        .mobile-value {
            min-width: 0;
            word-break: break-word;
        }
        .mobile-actions {
            margin-top: 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
            justify-content: flex-start;
        }
        .mobile-actions .action-btn,
        .mobile-actions .block-btn {
            margin: 0;
        }

        body.force-mobile-view {
            background: linear-gradient(180deg,#eaf1f8,#f4f7fc);
            display: grid;
            place-items: center;
            padding: 20px 12px;
            min-height: 100vh;
        }
        body.force-mobile-view .container {
            width: min(100%, 392px);
            max-width: 392px;
            height: min(840px, 95vh);
            border-radius: 34px;
            border: 1px solid #d8e3ef;
            background: #f9fbfe;
            box-shadow: 0 22px 50px rgba(96,126,163,.25);
            position: relative;
            overflow: hidden;
        }
        body.force-mobile-view .container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 28px;
            border-radius: 0 0 16px 16px;
            background: #e4edf7;
            z-index: 4;
        }
        body.force-mobile-view .topbar {
            padding: 36px 12px 10px;
            border-bottom: 1px solid #dce6f2;
            align-items: flex-start;
            gap: 10px;
        }
        body.force-mobile-view .title-wrap h1 {
            font-size: 1.05rem;
            margin-bottom: 2px;
        }
        body.force-mobile-view .welcome {
            font-size: .74rem;
            color: #6d83a3;
        }
        body.force-mobile-view .top-actions {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(2, minmax(0,1fr));
            gap: 6px;
            align-items: center;
        }
        body.force-mobile-view .view-switch {
            grid-column: 1 / -1;
            justify-content: center;
            width: 100%;
        }
        body.force-mobile-view .pill-btn {
            flex: 1;
            min-width: 0;
            text-align: center;
            padding: 8px 8px;
            font-size: .69rem;
            letter-spacing: .08px;
            min-height: 40px;
        }
        body.force-mobile-view .main {
            height: calc(100% - 96px);
            overflow: auto;
            padding: 12px 12px 86px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: stretch;
        }
        body.force-mobile-view .tabs {
            display: grid;
            grid-template-columns: repeat(2, minmax(0,1fr));
            align-items: center;
            gap: 6px;
            flex-wrap: nowrap;
            overflow-x: visible;
            margin-bottom: 2px;
            padding-bottom: 2px;
        }
        body.force-mobile-view .tab-btn {
            height: auto;
            line-height: 1.1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            white-space: nowrap;
            padding: 7px 11px;
            font-size: .73rem;
            font-weight: 700;
            min-height: 34px;
            width: 100%;
        }
        body.force-mobile-view .section-card {
            border-radius: 16px;
            border: 1px solid #dce6f2;
            padding: 10px;
            background: #fff;
        }
        body.force-mobile-view .mobile-sections-rail {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }
        body.force-mobile-view .tab-content {
            display: block;
            flex: 0 0 100%;
            min-width: 100%;
            scroll-snap-align: start;
        }
        body.force-mobile-view .section-title {
            font-size: .88rem;
            margin-bottom: 8px;
            color: #2c4f7d;
        }
        body.force-mobile-view .message {
            margin-bottom: 2px;
            font-size: .74rem;
            padding: 8px 10px;
            border-radius: 10px;
        }
        body.force-mobile-view .db-status {
            margin-bottom: 6px;
            gap: 6px;
            padding: 7px 8px;
        }
        body.force-mobile-view .db-status-title {
            font-size: .7rem;
        }
        body.force-mobile-view .db-pill {
            font-size: .68rem;
            padding: 6px 9px;
            width: 100%;
            justify-content: flex-start;
        }
        body.force-mobile-view .mobile-view {
            display: grid;
            gap: 9px;
        }
        body.force-mobile-view .mobile-card {
            border-radius: 12px;
            border: 1px solid #d7e7f9;
            background: #fff;
            padding: 10px;
        }
        body.force-mobile-view .mobile-card h3 {
            font-size: .84rem;
            color: #274f7d;
            margin-bottom: 6px;
            line-height: 1.35;
        }
        body.force-mobile-view .mobile-row {
            margin-bottom: 6px;
            font-size: .74rem;
            color: #5d789f;
            grid-template-columns: 82px 1fr;
            column-gap: 6px;
        }
        body.force-mobile-view .mobile-label {
            font-weight: 700;
            color: #3e628f;
        }
        body.force-mobile-view .mobile-actions {
            margin-top: 6px;
            gap: 6px;
            justify-content: flex-start;
        }
        body.force-mobile-view .action-btn,
        body.force-mobile-view .block-btn {
            padding: 6px 8px;
            font-size: .69rem;
            min-height: 34px;
        }
        body.force-mobile-view .user-mobile-card .mobile-actions .block-btn {
            width: 100%;
            min-width: 100%;
            text-align: center;
        }
        body.force-mobile-view .image-preview {
            width: 56px;
            height: 56px;
            border-radius: 8px;
        }

        /* Mobile toggle mode: match mobile site look, without clipping content */
        body.force-mobile-view {
            display: grid;
            place-items: start center;
            padding: 14px 10px;
            min-height: 100vh;
            overflow-y: auto;
        }
        body.force-mobile-view .container {
            width: min(100%, 420px);
            max-width: 420px;
            height: auto;
            max-height: none;
            border-radius: 26px;
            border: 1px solid #d8e3ef;
            background: #f9fbfe;
            box-shadow: 0 22px 50px rgba(96,126,163,.25);
            overflow: visible;
        }
        body.force-mobile-view .container::before {
            display: none;
        }
        body.force-mobile-view .topbar {
            padding: 14px 14px 10px;
            gap: 8px;
            align-items: flex-start;
        }
        body.force-mobile-view .title-wrap h1 {
            font-size: 1.05rem;
            margin-bottom: 2px;
        }
        body.force-mobile-view .welcome {
            font-size: .75rem;
        }
        body.force-mobile-view .top-actions {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(2, minmax(0,1fr));
            gap: 6px;
        }
        body.force-mobile-view .view-switch {
            width: 100%;
            grid-column: 1 / -1;
            justify-content: center;
        }
        body.force-mobile-view .pill-btn {
            min-height: 38px;
            font-size: .76rem;
        }
        body.force-mobile-view .main {
            padding: 10px 12px 14px;
            height: auto;
            overflow: visible;
            max-height: none;
        }
        body.force-mobile-view .db-status {
            margin-bottom: 8px;
        }
        body.force-mobile-view .db-pill {
            width: 100%;
        }
        body.force-mobile-view .tabs {
            display: grid;
            grid-template-columns: repeat(2, minmax(0,1fr));
            gap: 7px;
            overflow: visible;
            margin-bottom: 10px;
            padding-bottom: 0;
        }
        body.force-mobile-view .tab-btn {
            width: 100%;
            min-width: 0;
            min-height: 38px;
            font-size: .79rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="topbar">
            <div class="title-wrap">
                <h1>Admin Dashboard</h1>
                <p class="welcome">Welcome, <strong>{{ username }}</strong></p>
            </div>
            <div class="top-actions">
                <div class="view-switch" aria-label="Desktop mobile toggle">
                    <span class="switch-label desktop">Desktop</span>
                    <label class="toggle-switch" for="viewModeToggle">
                        <input id="viewModeToggle" type="checkbox" onchange="onViewModeToggleChange(this.checked)">
                        <span class="toggle-slider"></span>
                    </label>
                    <span class="switch-label mobile">Mobile</span>
                </div>
                <a class="pill-btn view-btn" href="{{ url_for('index') }}">Home</a>
                <a class="pill-btn logout-btn" href="{{ url_for('logout') }}">Logout</a>
            </div>
        </header>

        <main class="main">
            <div id="message"></div>
            <div id="dbStatusBar" class="db-status" aria-live="polite">
                <strong class="db-status-title">Database Status</strong>
                <span class="db-pill"><span class="db-dot" id="dbActiveDot"></span><span id="dbActiveText">Active: checking...</span></span>
                <span class="db-pill"><span class="db-dot" id="dbNextDot"></span><span id="dbNextText">Next: checking...</span></span>
            </div>

            <div class="tabs">
                <button class="tab-btn active" data-tab="users" onclick="switchTab('users', this)">Users Management</button>
                <button class="tab-btn" data-tab="incidents" onclick="switchTab('incidents', this)">Disaster Incidents</button>
            </div>

            <div id="mobileSectionsRail" class="mobile-sections-rail">
                <div id="users" class="tab-content active">
                    <section class="section-card">
                        <h2 class="section-title">All Users</h2>
                        <div id="usersContainer" class="loading">Loading users...</div>
                    </section>
                </div>

                <div id="incidents" class="tab-content">
                    <section class="section-card">
                        <h2 class="section-title">Reported Disaster Incidents</h2>
                        <div id="incidentsContainer" class="loading">Loading incidents...</div>
                    </section>
                </div>
            </div>
        </main>
    </div>

    <script>
        let adminViewMode = 'desktop';
        let currentAdminTab = 'users';
        let mobileIncidentsLoaded = false;

        function updateViewModeToggleControl() {
            const toggleInput = document.getElementById('viewModeToggle');
            const switchWrap = document.querySelector('.view-switch');
            if (!toggleInput) return;
            toggleInput.checked = adminViewMode === 'mobile';
            if (switchWrap) {
                switchWrap.classList.toggle('mobile-on', adminViewMode === 'mobile');
            }
        }

        function setActiveTabButton(tabName) {
            document.querySelectorAll('.tab-btn').forEach((btn) => {
                btn.classList.toggle('active', btn.dataset.tab === tabName);
            });
        }

        function scrollToMobileTab(tabName) {
            const rail = document.getElementById('mobileSectionsRail');
            const section = document.getElementById(tabName);
            if (!rail || !section) return;
            rail.scrollTo({ left: section.offsetLeft, behavior: 'smooth' });
        }

        function syncTabFromMobileRail() {
            if (adminViewMode !== 'mobile') return;
            const rail = document.getElementById('mobileSectionsRail');
            if (!rail) return;

            const tabName = rail.scrollLeft > (rail.clientWidth * 0.5) ? 'incidents' : 'users';
            if (currentAdminTab !== tabName) {
                currentAdminTab = tabName;
                setActiveTabButton(tabName);
                if (tabName === 'incidents' && !mobileIncidentsLoaded) {
                    loadIncidents();
                    mobileIncidentsLoaded = true;
                }
            }
        }

        function applyAdminViewMode() {
            if (adminViewMode === 'mobile') {
                document.body.classList.add('force-mobile-view');
                document.querySelectorAll('.tab-content').forEach(tab => tab.classList.add('active'));
                setActiveTabButton(currentAdminTab);
                scrollToMobileTab(currentAdminTab);
                if (!mobileIncidentsLoaded) {
                    loadIncidents();
                    mobileIncidentsLoaded = true;
                }
            } else {
                document.body.classList.remove('force-mobile-view');
                document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
                const currentTab = document.getElementById(currentAdminTab) || document.getElementById('users');
                if (currentTab) currentTab.classList.add('active');
                setActiveTabButton(currentAdminTab);
            }

            updateViewModeToggleControl();
        }

        function setAdminViewMode(mode) {
            adminViewMode = mode === 'mobile' ? 'mobile' : 'desktop';
            localStorage.setItem('adminViewMode', adminViewMode);
            applyAdminViewMode();
        }

        function onViewModeToggleChange(isMobile) {
            setAdminViewMode(isMobile ? 'mobile' : 'desktop');
        }

        function setDbIndicator(dotId, textId, text, isConnected) {
            const dot = document.getElementById(dotId);
            const label = document.getElementById(textId);
            if (label) label.textContent = text;
            if (!dot) return;
            dot.classList.remove('ok', 'fail');
            dot.classList.add(isConnected ? 'ok' : 'fail');
        }

        function updateDbStatusBar(payload) {
            if (!payload || !payload.databases) return;

            const activeDb = String(payload.active_db || payload.primary_db || '').toLowerCase();
            const activeKey = activeDb === 'sqlite' ? 'sqlite' : 'mysql';
            const nextKey = activeKey === 'mysql' ? 'sqlite' : 'mysql';

            const activeInfo = payload.databases[activeKey] || {};
            const nextInfo = payload.databases[nextKey] || {};

            const activeText = `Current DB: ${activeKey.toUpperCase()} (${activeInfo.connected ? 'Connected' : 'Disconnected'})`;
            const nextText = `Fallback DB: ${nextKey.toUpperCase()} (${nextInfo.connected ? 'Ready' : 'Down'})`;

            setDbIndicator('dbActiveDot', 'dbActiveText', activeText, !!activeInfo.connected);
            setDbIndicator('dbNextDot', 'dbNextText', nextText, !!nextInfo.connected);
        }

        function loadDbStatus() {
            fetch('/health/db')
                .then(response => response.json())
                .then(data => {
                    updateDbStatusBar(data);
                })
                .catch(() => {
                    setDbIndicator('dbActiveDot', 'dbActiveText', 'Current DB: unknown', false);
                    setDbIndicator('dbNextDot', 'dbNextText', 'Fallback DB: unknown', false);
                });
        }

        // Switch between tabs
        function switchTab(tabName, tabButton) {
            currentAdminTab = tabName;

            if (adminViewMode === 'mobile') {
                setActiveTabButton(tabName);
                scrollToMobileTab(tabName);
                if (tabName === 'users') {
                    loadUsers();
                } else if (tabName === 'incidents') {
                    loadIncidents();
                    mobileIncidentsLoaded = true;
                }
                return;
            }

            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // Show selected tab
            document.getElementById(tabName).classList.add('active');
            if (tabButton) {
                tabButton.classList.add('active');
            }
            
            // Load data for the tab
            if (tabName === 'users') {
                loadUsers();
            } else if (tabName === 'incidents') {
                loadIncidents();
            }
        }
        
        // Load users on page load
        document.addEventListener('DOMContentLoaded', () => {
            const savedMode = localStorage.getItem('adminViewMode');
            if (savedMode === 'mobile' || savedMode === 'desktop') {
                adminViewMode = savedMode;
            }

            const rail = document.getElementById('mobileSectionsRail');
            if (rail) {
                rail.addEventListener('scroll', syncTabFromMobileRail, { passive: true });
            }

            applyAdminViewMode();
            loadDbStatus();
            setInterval(loadDbStatus, 15000);
            loadUsers();
        });

        function loadUsers() {
            fetch('{{ url_for("get_all_users") }}')
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        displayUsers(data.users);
                    } else {
                        showMessage(data.message || 'Failed to load users', 'error');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    showMessage('Error loading users', 'error');
                });
        }

        function displayUsers(users) {
            const container = document.getElementById('usersContainer');
            
            if (users.length === 0) {
                container.innerHTML = '<p style="padding: 20px;">No users found.</p>';
                return;
            }

            let html = `
                <div class="desktop-view">
                    <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>User ID</th>
                                <th>Name</th>
                                <th>Username</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Role</th>
                                <th>Status</th>
                                <th>Created At</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            users.forEach(user => {
                const statusBadge = user.is_blocked
                    ? '<span class="status-pill status-blocked">Blocked</span>'
                    : '<span class="status-pill status-active">Active</span>';
                html += `
                    <tr>
                        <td>${user.user_id}</td>
                        <td>${user.name}</td>
                        <td>${user.username}</td>
                        <td>${user.email}</td>
                        <td>${user.phone}</td>
                        <td>${user.role}</td>
                        <td>${statusBadge}</td>
                        <td>${user.created_at}</td>
                        <td><button class="block-btn" onclick="blockUser(${user.user_id}, '${user.username}', ${user.is_blocked})">
                            ${user.is_blocked ? 'Unblock' : 'Block'}</button></td>
                    </tr>
                `;
            });

            html += `
                        </tbody>
                    </table>
                    </div>
                </div>
                <div class="mobile-view">
            `;

            users.forEach(user => {
                const statusBadge = user.is_blocked
                    ? '<span class="status-pill status-blocked">Blocked</span>'
                    : '<span class="status-pill status-active">Active</span>';
                html += `
                    <article class="mobile-card user-mobile-card">
                        <h3>${user.name} (${user.username})</h3>
                        <div class="mobile-row"><span class="mobile-label">User ID</span><span class="mobile-value">${user.user_id}</span></div>
                        <div class="mobile-row"><span class="mobile-label">Email</span><span class="mobile-value">${user.email}</span></div>
                        <div class="mobile-row"><span class="mobile-label">Phone</span><span class="mobile-value">${user.phone}</span></div>
                        <div class="mobile-row"><span class="mobile-label">Role</span><span class="mobile-value">${user.role}</span></div>
                        <div class="mobile-row"><span class="mobile-label">Status</span><span class="mobile-value">${statusBadge}</span></div>
                        <div class="mobile-row"><span class="mobile-label">Created</span><span class="mobile-value">${user.created_at}</span></div>
                        <div class="mobile-actions">
                            <button class="block-btn" onclick="blockUser(${user.user_id}, '${user.username}', ${user.is_blocked})">
                                ${user.is_blocked ? 'Unblock' : 'Block'}
                            </button>
                        </div>
                    </article>
                `;
            });

            html += `
                </div>
            `;

            container.innerHTML = html;
        }

        function loadIncidents() {
            fetch('{{ url_for("get_all_incidents") }}')
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        displayIncidents(data.incidents);
                    } else {
                        showMessage(data.message || 'Failed to load incidents', 'error');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    showMessage('Error loading incidents', 'error');
                });
        }

        function displayIncidents(incidents) {
            const container = document.getElementById('incidentsContainer');
            
            if (incidents.length === 0) {
                container.innerHTML = '<p style="padding: 20px;">No incidents reported yet.</p>';
                return;
            }

            let html = `
                <div class="desktop-view">
                    <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Reported By</th>
                                <th>Type</th>
                                <th>Location</th>
                                <th>Description</th>
                                <th>Verified</th>
                                <th>Image</th>
                                <th>Reported At</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            incidents.forEach(incident => {
                const verifiedBadge = incident.is_verified 
                    ? '<span class="verified-badge">✓ Verified</span>'
                    : '<span class="unverified-badge">⚠ Unverified</span>';
                
                const imageHtml = incident.image_url 
                    ? `<img src="${incident.image_url}" class="image-preview" alt="Incident image">`
                    : 'No image';
                const descriptionText = incident.description ? incident.description : '-';
                
                html += `
                    <tr>
                        <td>${incident.incident_id}</td>
                        <td>${incident.username}</td>
                        <td>${incident.incident_type}</td>
                        <td>${incident.location}</td>
                        <td>${descriptionText.length > 50 ? descriptionText.substring(0, 50) + '...' : descriptionText}</td>
                        <td>${verifiedBadge}</td>
                        <td>${imageHtml}</td>
                        <td>${incident.created_at}</td>
                        <td>
                            <button class="action-btn verify-btn" onclick="verifyIncident(${incident.incident_id})">
                                ${incident.is_verified ? 'Unverify' : 'Verify'}</button>
                            <button class="action-btn delete-btn" onclick="deleteIncident(${incident.incident_id}, '${incident.incident_type}')">Delete</button>
                        </td>
                    </tr>
                `;
            });

            html += `
                        </tbody>
                    </table>
                    </div>
                </div>
                <div class="mobile-view">
            `;

            incidents.forEach(incident => {
                const verifiedBadge = incident.is_verified 
                    ? '<span class="verified-badge">✓ Verified</span>'
                    : '<span class="unverified-badge">⚠ Unverified</span>';
                const imageHtml = incident.image_url 
                    ? `<img src="${incident.image_url}" class="image-preview" alt="Incident image">`
                    : 'No image';
                const descriptionText = incident.description ? incident.description : '-';

                html += `
                    <article class="mobile-card">
                        <h3>${incident.incident_type} • #${incident.incident_id}</h3>
                        <div class="mobile-row"><span class="mobile-label">Reporter</span><span class="mobile-value">${incident.username}</span></div>
                        <div class="mobile-row"><span class="mobile-label">Location</span><span class="mobile-value">${incident.location}</span></div>
                        <div class="mobile-row"><span class="mobile-label">Description</span><span class="mobile-value">${descriptionText}</span></div>
                        <div class="mobile-row"><span class="mobile-label">Status</span><span class="mobile-value">${verifiedBadge}</span></div>
                        <div class="mobile-row"><span class="mobile-label">Image</span><span class="mobile-value">${imageHtml}</span></div>
                        <div class="mobile-row"><span class="mobile-label">Reported</span><span class="mobile-value">${incident.created_at}</span></div>
                        <div class="mobile-actions">
                            <button class="action-btn verify-btn" onclick="verifyIncident(${incident.incident_id})">
                                ${incident.is_verified ? 'Unverify' : 'Verify'}
                            </button>
                            <button class="action-btn delete-btn" onclick="deleteIncident(${incident.incident_id}, '${incident.incident_type}')">Delete</button>
                        </div>
                    </article>
                `;
            });

            html += `
                </div>
            `;

            container.innerHTML = html;
        }

        function blockUser(userId, username, isCurrentlyBlocked) {
            const action = isCurrentlyBlocked ? 'unblock' : 'block';
            const message = isCurrentlyBlocked 
                ? `Are you sure you want to unblock user "${username}"?`
                : `Are you sure you want to block user "${username}"?`;
            
            if (confirm(message)) {
                fetch('{{ url_for("block_user") }}', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ user_id: userId })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        const msg = isCurrentlyBlocked 
                            ? `User "${username}" unblocked successfully`
                            : `User "${username}" blocked successfully`;
                        showMessage(msg, 'success');
                        setTimeout(loadUsers, 1500);
                    } else {
                        showMessage(data.message || 'Failed to update user', 'error');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    showMessage('Error updating user', 'error');
                });
            }
        }

        function verifyIncident(incidentId) {
            fetch('{{ url_for("verify_incident") }}', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ incident_id: incidentId })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showMessage('Incident status updated successfully', 'success');
                    setTimeout(loadIncidents, 1500);
                } else {
                    showMessage(data.message || 'Failed to update incident', 'error');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                showMessage('Error updating incident', 'error');
            });
        }

        function deleteIncident(incidentId, incidentType) {
            if (confirm(`Are you sure you want to delete this ${incidentType} incident? This action cannot be undone.`)) {
                fetch('{{ url_for("delete_incident") }}', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ incident_id: incidentId })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        showMessage('Incident deleted successfully', 'success');
                        setTimeout(loadIncidents, 1500);
                    } else {
                        showMessage(data.message || 'Failed to delete incident', 'error');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    showMessage('Error deleting incident', 'error');
                });
            }
        }

        function showMessage(message, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = message;
            messageDiv.className = `message ${type}`;
            setTimeout(() => {
                messageDiv.textContent = '';
                messageDiv.className = '';
            }, 5000);
        }
    </script>
</body>
</html>
