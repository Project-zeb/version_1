<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Disaster Guard • SOS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --phone:#f9f4f5;
            --text:#1e1f24;
            --muted:#9a9aa3;
            --sos:#f05e67;
            --sos-deep:#e34f5a;
            --ring1:rgba(240,94,103,.24);
            --ring2:rgba(240,94,103,.34);
        }

        * {
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body {
            font-family:Inter,sans-serif;
            background:linear-gradient(180deg,#eaf1f8,#f4f7fc);
            min-height:100vh;
            display:grid;
            place-items:center;
            padding:20px 12px;
            color:var(--text);
        }

        .phone {
            width:min(100%,392px);
            height:min(840px,95vh);
            border-radius:34px;
            border:1px solid #d8e3ef;
            background:var(--phone);
            box-shadow:0 22px 50px rgba(96,126,163,.25);
            overflow:hidden;
            position:relative;
        }

        .status-notch {
            height:28px;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .notch {
            width:120px;
            height:28px;
            border-radius:0 0 16px 16px;
            background:#ebe3e5;
        }

        .app {
            height:calc(100% - 84px);
            overflow:auto;
            padding:16px 16px 18px;
            display:grid;
            grid-template-rows:auto auto 1fr auto;
            gap:14px;
        }

        .header {
            display:flex;
            justify-content:space-between;
            align-items:flex-start;
        }

        .welcome small {
            display:block;
            color:#a7a5ac;
            font-size:.8rem;
            font-weight:600;
            margin-bottom:2px;
        }

        .welcome strong {
            display:block;
            font-size:1.02rem;
            line-height:1.3;
        }

        .avatar {
            width:44px;
            height:44px;
            border-radius:50%;
            border:2px solid #fff;
            box-shadow:0 8px 18px rgba(121,94,103,.18);
            object-fit:cover;
            background:#d8d8dd;
        }

        .title {
            text-align:center;
        }

        .title h1 {
            font-size:2rem;
            letter-spacing:.2px;
            margin-bottom:8px;
        }

        .title p {
            color:var(--muted);
            font-size:.95rem;
            font-weight:500;
            line-height:1.4;
        }

        .sos-zone {
            display:grid;
            place-items:center;
            align-content:center;
        }

        .ring-outer,
        .ring-mid,
        .ring-inner,
        .sos-btn {
            border-radius:50%;
            display:grid;
            place-items:center;
        }

        .ring-outer {
            width:318px;
            height:318px;
            background:var(--ring1);
        }

        .ring-mid {
            width:266px;
            height:266px;
            background:var(--ring2);
        }

        .ring-inner {
            width:224px;
            height:224px;
            background:linear-gradient(180deg,#ef656e,var(--sos));
            box-shadow:0 14px 28px rgba(208,78,88,.28);
        }

        .sos-btn {
            width:200px;
            height:200px;
            border:none;
            background:linear-gradient(180deg,var(--sos),var(--sos-deep));
            color:#fff;
            font-size:3rem;
            font-weight:800;
            letter-spacing:1px;
            cursor:pointer;
            box-shadow:inset 0 -10px 16px rgba(184,49,60,.22),0 10px 20px rgba(170,55,64,.25);
        }

        .address {
            border-radius:18px;
            border:1px solid #eadde0;
            background:#fff;
            padding:12px 14px;
            display:grid;
            gap:4px;
            box-shadow:0 8px 18px rgba(145,125,132,.14);
        }

        .address strong {
            font-size:.95rem;
        }

        .address p {
            font-size:.8rem;
            color:#7f8089;
            line-height:1.4;
        }

        .footer {
            display:flex;
            justify-content:center;
            padding:0 0 8px;
        }

        .back {
            border:none;
            background:#fff;
            border:1px solid #e5d9dd;
            color:#7c4f57;
            border-radius:10px;
            font-weight:700;
            font-size:.8rem;
            padding:8px 14px;
            cursor:pointer;
        }

        @media (max-width: 380px) {
            .ring-outer { width:286px; height:286px; }
            .ring-mid { width:244px; height:244px; }
            .ring-inner { width:210px; height:210px; }
            .sos-btn { width:186px; height:186px; font-size:2.6rem; }
            .title h1 { font-size:1.85rem; }
        }
    </style>
</head>
<body>
    <section class="phone">
        <div class="status-notch"><div class="notch"></div></div>
        <main class="app">
            <header class="header">
                <div class="welcome">
                    <small>Welcome back,</small>
                    <strong>Refan Shaquiel</strong>
                </div>
                <img class="avatar" src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=200&q=80" alt="Profile" />
            </header>

            <section class="title">
                <h1>Are you in emergency?</h1>
                <p>Press the button below help will<br />reach you soon</p>
            </section>

            <section class="sos-zone">
                <div class="ring-outer">
                    <div class="ring-mid">
                        <div class="ring-inner">
                            <button class="sos-btn" id="sosTrigger" aria-label="Send emergency request">SOS</button>
                        </div>
                    </div>
                </div>
            </section>

            <section class="address">
                <strong>Your current address</strong>
                <p>Electronic City, Bengaluru • Karnataka 560100</p>
            </section>
        </main>
        <div class="footer">
            <button class="back" id="backHome">Back to Home</button>
        </div>
    </section>

    <script>
        const sosTrigger = document.getElementById('sosTrigger');
        const backHome = document.getElementById('backHome');

        sosTrigger.addEventListener('click', () => {
            sosTrigger.textContent = 'SENT';
            setTimeout(() => {
                sosTrigger.textContent = 'SOS';
            }, 1200);
        });

        backHome.addEventListener('click', () => {
            window.location.href = 'home-mobile.html';
        });
    </script>
</body>
</html>
