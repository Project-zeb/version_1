<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Disaster Guard • Offline SOS</title>
  <style>
    :root {
      --phone:#f9f4f5;
      --text:#1e1f24;
      --muted:#9a9aa3;
      --sos:#f05e67;
      --sos-deep:#e34f5a;
      --ring1:rgba(240,94,103,.24);
      --ring2:rgba(240,94,103,.34);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: linear-gradient(180deg,#eaf1f8,#f4f7fc);
      display:grid;
      place-items:center;
      color:var(--text);
      padding:20px 12px;
    }

    .phone {
      width:min(100%,392px);
      height:min(840px,95vh);
      border-radius:34px;
      border:1px solid #d8e3ef;
      background:var(--phone);
      box-shadow:0 22px 50px rgba(96,126,163,.25);
      overflow:hidden;
      position:relative;
    }

    .status-notch {
      height:28px;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .notch {
      width:120px;
      height:28px;
      border-radius:0 0 16px 16px;
      background:#ebe3e5;
    }

    .app {
      height:calc(100% - 84px);
      overflow:auto;
      padding:16px 16px 18px;
      display:grid;
      grid-template-rows:auto auto 1fr auto;
      gap:14px;
    }

    .title {
      text-align:center;
    }

    .offline-label {
      display:inline-block;
      font-size:.72rem;
      font-weight:700;
      color:#3e5f8a;
      background:#e8f0fb;
      border:1px solid #c8d9f2;
      border-radius:999px;
      padding:3px 8px;
      letter-spacing:.5px;
      text-transform:lowercase;
      margin-bottom:8px;
    }

    .title h1 {
      font-size:2rem;
      letter-spacing:.2px;
      margin-bottom:8px;
    }

    .title p {
      color:var(--muted);
      font-size:.92rem;
      font-weight:500;
      line-height:1.4;
    }

    .disaster-select {
      margin-top:10px;
      border:1px solid #d8e6f3;
      background:#ffffff;
      border-radius:14px;
      padding:10px;
      display:grid;
      gap:8px;
    }

    .disaster-select small {
      color:#6b7f9b;
      font-size:.72rem;
      font-weight:700;
      text-align:left;
    }

    .disaster-select select {
      border:1px solid #d3e2f2;
      border-radius:10px;
      padding:8px 10px;
      font-size:.86rem;
      font-weight:600;
      color:#355980;
      background:#f3f8ff;
    }

    .sos-zone {
      display:grid;
      place-items:center;
      align-content:center;
    }

    .ring-outer,
    .ring-mid,
    .ring-inner,
    .sos-btn {
      border-radius:50%;
      display:grid;
      place-items:center;
    }

    .ring-outer {
      width:318px;
      height:318px;
      background:var(--ring1);
    }

    .ring-mid {
      width:266px;
      height:266px;
      background:var(--ring2);
    }

    .ring-inner {
      width:224px;
      height:224px;
      background:linear-gradient(180deg,#ef656e,var(--sos));
      box-shadow:0 14px 28px rgba(208,78,88,.28);
    }

    .sos-btn {
      width:200px;
      height:200px;
      border:none;
      background:linear-gradient(180deg,var(--sos),var(--sos-deep));
      color:#fff;
      font-size:2.2rem;
      font-weight:800;
      letter-spacing:1px;
      cursor:pointer;
      box-shadow:inset 0 -10px 16px rgba(184,49,60,.22),0 10px 20px rgba(170,55,64,.25);
    }

    .sos-btn:active {
      transform:scale(.97);
    }

    .sos-status {
      margin-top:10px;
      font-size:.78rem;
      font-weight:700;
      color:#94535d;
      text-align:center;
      min-height:18px;
    }

    .address {
      border-radius:18px;
      border:1px solid #eadde0;
      background:#fff;
      padding:12px 14px;
      display:grid;
      gap:4px;
      box-shadow:0 8px 18px rgba(145,125,132,.14);
    }

    .address strong {
      font-size:.95rem;
    }

    .address p {
      font-size:.8rem;
      color:#7f8089;
      line-height:1.4;
    }

    .loc-meta {
      font-size:.72rem;
      color:#9f8f95;
      font-weight:600;
    }

    @media (max-width: 380px) {
      .ring-outer { width:286px; height:286px; }
      .ring-mid { width:244px; height:244px; }
      .ring-inner { width:210px; height:210px; }
      .sos-btn { width:186px; height:186px; font-size:2rem; }
      .title h1 { font-size:1.85rem; }
    }
  </style>
</head>
<body>
  <section class="phone">
    <div class="status-notch"><div class="notch"></div></div>
    <main class="app">
      <section class="title">
        <span class="offline-label">offline mode</span>
        <h1>Are you in emergency?</h1>
        <p>No internet detected.<br />Tap SOS to send SMS request.</p>
        <div class="disaster-select">
          <small>Disaster type (optional)</small>
          <select id="disasterType">
            <option value="">Not selected</option>
            <option value="Earthquake">Earthquake</option>
            <option value="Flood">Flood</option>
            <option value="Fire">Fire</option>
            <option value="Medical">Medical</option>
            <option value="Landslide">Landslide</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </section>

      <section class="sos-zone">
        <div class="ring-outer">
          <div class="ring-mid">
            <div class="ring-inner">
              <button class="sos-btn" id="sosTrigger" aria-label="Send emergency request">SOS</button>
            </div>
          </div>
        </div>
        <p class="sos-status" id="sosStatus">Offline SOS ready</p>
      </section>

      <section class="address">
        <strong>Your current address</strong>
        <p id="locationText">Locating...</p>
        <span class="loc-meta" id="locationMeta">Waiting for GPS permission</span>
      </section>
    </main>
  </section>

  <script>
    const SOS_SMS_NUMBER = '+918700523035';
    const LOCATION_CACHE_KEY = 'projectz_last_known_location_v1';
    const sosTrigger = document.getElementById('sosTrigger');
    const sosStatus = document.getElementById('sosStatus');
    const disasterType = document.getElementById('disasterType');
    const locationText = document.getElementById('locationText');
    const locationMeta = document.getElementById('locationMeta');

    let currentCoords = null;

    const setCoordText = (lat, lon) => {
      currentCoords = { lat, lon };
      locationText.textContent = `${lat.toFixed(5)}, ${lon.toFixed(5)}`;
      locationMeta.textContent = 'Coordinates captured';
      try {
        localStorage.setItem(LOCATION_CACHE_KEY, JSON.stringify({
          lat,
          lon,
          label: locationText.textContent,
          savedAt: new Date().toISOString()
        }));
      } catch (error) {
      }
    };

    const applyCachedLocation = () => {
      try {
        const raw = localStorage.getItem(LOCATION_CACHE_KEY);
        if (!raw) {
          return false;
        }
        const cached = JSON.parse(raw);
        if (typeof cached?.lat !== 'number' || typeof cached?.lon !== 'number') {
          return false;
        }
        currentCoords = { lat: cached.lat, lon: cached.lon };
        if (cached.label && String(cached.label).trim()) {
          locationText.textContent = String(cached.label).trim();
        } else {
          locationText.textContent = `${cached.lat.toFixed(5)}, ${cached.lon.toFixed(5)}`;
        }
        locationMeta.textContent = 'Using last known saved location';
        return true;
      } catch (error) {
        return false;
      }
    };

    const reverseGeocode = async (lat, lon) => {
      if (!navigator.onLine) {
        return;
      }
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 5000);
      try {
        const response = await fetch(
          `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`,
          { signal: controller.signal }
        );
        const data = await response.json();
        if (data && data.display_name) {
          locationText.textContent = data.display_name;
          locationMeta.textContent = 'Precise GPS location';
        }
      } catch (error) {
        locationMeta.textContent = 'Using coordinate-only fallback';
      } finally {
        clearTimeout(timeout);
      }
    };

    const applyPosition = (position) => {
      const lat = position.coords.latitude;
      const lon = position.coords.longitude;
      setCoordText(lat, lon);
      const accuracy = Number(position?.coords?.accuracy || 0);
      if (accuracy > 0) {
        locationMeta.textContent = `GPS accuracy ~${Math.round(accuracy)}m`;
      }
      reverseGeocode(lat, lon);
    };

    const fallbackLocation = () => {
      if (applyCachedLocation()) {
        return;
      }
      locationText.textContent = 'Location unavailable';
      locationMeta.textContent = 'Enable location if possible';
    };

    const fetchFastLocation = () => {
      applyCachedLocation();
      if (!navigator.geolocation) {
        fallbackLocation();
        return;
      }

      navigator.geolocation.getCurrentPosition(
        applyPosition,
        () => {
          navigator.geolocation.getCurrentPosition(
            applyPosition,
            () => {
              navigator.geolocation.getCurrentPosition(
                applyPosition,
                fallbackLocation,
                { enableHighAccuracy: false, timeout: 8000, maximumAge: 86400000 }
              );
            },
            { enableHighAccuracy: false, timeout: 3500, maximumAge: 86400000 }
          );
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    };

    const buildSosMessage = () => {
      const selected = disasterType.value || 'Emergency';
      const locationLabel = (locationText.textContent || '').trim() || 'Location unavailable';
      const coordsText = currentCoords
        ? `${currentCoords.lat.toFixed(5)}, ${currentCoords.lon.toFixed(5)}`
        : 'Coordinates unavailable';
      const mapLink = currentCoords
        ? `https://maps.google.com/?q=${currentCoords.lat},${currentCoords.lon}`
        : 'Map unavailable';

      return [
        'HELP! I am in disaster (Offline)',
        `Disaster type: ${selected}`,
        `Live location: ${locationLabel}`,
        `Coordinates: ${coordsText}`,
        `Map: ${mapLink}`
      ].join('\n');
    };

    sosTrigger.addEventListener('click', () => {
      const smsBody = encodeURIComponent(buildSosMessage());
      sosStatus.textContent = 'Opening SMS...';
      window.location.href = `sms:${SOS_SMS_NUMBER}?&body=${smsBody}`;
    });

    fetchFastLocation();
  </script>
</body>
</html>
