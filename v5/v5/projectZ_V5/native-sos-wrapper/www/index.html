<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#39c184" />
  <title>ProjectZ SOS Offline</title>
  <style>
    :root {
      --phone:#f9f4f5;
      --text:#1e1f24;
      --muted:#9a9aa3;
      --sos:#f05e67;
      --sos-deep:#e34f5a;
      --ring1:rgba(240,94,103,.24);
      --ring2:rgba(240,94,103,.34);
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; }

    body {
      min-height:100vh;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background:linear-gradient(180deg,#eaf1f8,#f4f7fc);
      color:var(--text);
      padding:0;
    }

    .phone {
      width:100%;
      min-height:100vh;
      background:transparent;
      position:relative;
    }

    .app {
      width:min(100%,430px);
      min-height:100vh;
      margin:0 auto;
      overflow:auto;
      padding:72px 16px 72px;
      display:grid;
      grid-template-rows:auto auto auto;
      gap:14px;
      align-content:start;
    }

    .title { text-align:center; }
    .title h1 { font-size:2rem; letter-spacing:.2px; margin-bottom:8px; }
    .title p { color:var(--muted); font-size:.92rem; font-weight:500; line-height:1.4; }

    .sos-zone { display:grid; place-items:center; align-content:center; }

    .ring-outer, .ring-mid, .ring-inner, .sos-btn {
      border-radius:50%;
      display:grid;
      place-items:center;
    }

    .ring-outer { width:318px; height:318px; background:var(--ring1); }
    .ring-mid { width:266px; height:266px; background:var(--ring2); }
    .ring-inner {
      width:224px;
      height:224px;
      background:linear-gradient(180deg,#ef656e,var(--sos));
      box-shadow:0 14px 28px rgba(208,78,88,.28);
    }

    .ring-outer {
      animation:ringPulseOuter 2.1s ease-in-out infinite;
    }

    .ring-mid {
      animation:ringPulseMid 1.8s ease-in-out infinite;
    }

    .sos-zone.live-press .ring-outer,
    .sos-zone.triggered .ring-outer {
      background:rgba(57,193,132,.24);
    }

    .sos-zone.live-press .ring-mid,
    .sos-zone.triggered .ring-mid {
      background:rgba(57,193,132,.34);
    }

    .sos-zone.live-press .ring-inner,
    .sos-zone.triggered .ring-inner {
      background:linear-gradient(180deg,#66d09b,#2fb176);
      box-shadow:0 14px 28px rgba(43,155,101,.26);
    }

    .sos-btn {
      width:200px;
      height:200px;
      border:none;
      background:linear-gradient(180deg,var(--sos),var(--sos-deep));
      color:#fff;
      font-size:2.4rem;
      font-weight:800;
      letter-spacing:1px;
      cursor:pointer;
      touch-action:none;
      -webkit-user-select:none;
      user-select:none;
      -webkit-touch-callout:none;
      -webkit-tap-highlight-color:transparent;
      box-shadow:inset 0 -10px 16px rgba(184,49,60,.22),0 10px 20px rgba(170,55,64,.25);
      transition:transform .16s ease, filter .16s ease;
      animation:sosBreath 1.9s ease-in-out infinite;
    }

    .sos-btn.pressed { transform:scale(.96); filter:brightness(.95); }

    .sos-btn.live-press,
    .sos-btn.triggered {
      background:linear-gradient(180deg,#39c184,#1ea06a);
      box-shadow:inset 0 -10px 16px rgba(22,120,80,.20),0 10px 20px rgba(25,128,88,.22);
      animation:none;
    }

    .sos-btn.pressed {
      animation:none;
    }

    @keyframes ringPulseOuter {
      0%, 100% { transform:scale(1); opacity:.92; }
      50% { transform:scale(1.045); opacity:.76; }
    }

    @keyframes ringPulseMid {
      0%, 100% { transform:scale(1); opacity:.9; }
      50% { transform:scale(1.04); opacity:.78; }
    }

    @keyframes sosBreath {
      0%, 100% { transform:scale(1); }
      50% { transform:scale(1.03); }
    }

    .sos-status {
      margin-top:10px;
      font-size:.78rem;
      font-weight:700;
      color:#94535d;
      text-align:center;
      min-height:18px;
    }

    .address {
      border-radius:18px;
      border:1px solid #eadde0;
      background:#fff;
      padding:12px 14px;
      display:grid;
      gap:4px;
      box-shadow:0 8px 18px rgba(145,125,132,.14);
      min-height:0;
    }

    .footer-tag {
      position:fixed;
      left:0;
      right:0;
      bottom:calc(env(safe-area-inset-bottom, 0px) + 20px);
      text-align:center;
      font-size:.75rem;
      font-weight:700;
      color:#4e79b6;
      padding:6px 0;
      letter-spacing:.2px;
      pointer-events:none;
      z-index:30;
      display:block;
      opacity:1;
      transition:opacity .18s ease;
    }

    .footer-tag.hidden {
      opacity:0;
    }

    .address strong { font-size:.95rem; }
    .address p {
      font-size:.8rem;
      color:#7f8089;
      line-height:1.4;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .loc-meta {
      font-size:.72rem;
      color:#9f8f95;
      font-weight:600;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      display:block;
    }

    .action-panel {
      position:absolute;
      inset:0;
      background:rgba(20, 24, 33, .72);
      display:none;
      align-items:flex-end;
      justify-content:center;
      padding:18px 14px;
      z-index:20;
    }

    .action-panel.show {
      display:flex;
    }

    .action-sheet {
      width:100%;
      border-radius:18px;
      border:1px solid #ebdce1;
      background:#fff;
      box-shadow:0 18px 36px rgba(33, 25, 28, .28);
      padding:12px;
      display:grid;
      gap:10px;
    }

    .action-sheet h2 {
      font-size:.95rem;
      text-align:center;
      color:#884b55;
    }

    .action-buttons {
      display:grid;
      gap:8px;
    }

    .action-btn {
      border:none;
      border-radius:12px;
      min-height:48px;
      font-weight:800;
      font-size:.9rem;
      letter-spacing:.2px;
      cursor:pointer;
    }

    .action-btn.call {
      color:#fff;
      background:linear-gradient(180deg,#1eb879,#13945f);
    }

    .action-btn.sms {
      color:#fff;
      background:linear-gradient(180deg,#4e8bf0,#2f6ede);
    }

    .action-btn.close {
      color:#7e4f58;
      background:#fff;
      border:1px solid #e8d7dd;
    }

    @media (max-width: 380px) {
      .ring-outer { width:286px; height:286px; }
      .ring-mid { width:244px; height:244px; }
      .ring-inner { width:210px; height:210px; }
      .sos-btn { width:186px; height:186px; font-size:2rem; }
      .title h1 { font-size:1.85rem; }
    }
  </style>
</head>
<body>
  <section class="phone">
    <main class="app">
      <section class="title">
        <h1>Emergency SOS</h1>
        <p>Long press to place emergency call or send SOS SMS.</p>
      </section>

      <section class="sos-zone">
        <div class="ring-outer">
          <div class="ring-mid">
            <div class="ring-inner">
              <button class="sos-btn" id="sosTrigger" aria-label="Send emergency request">SOS</button>
            </div>
          </div>
        </div>
        <p class="sos-status" id="sosStatus">Press and hold to send emergency request</p>
      </section>

      <section class="address">
        <strong>Your current address</strong>
        <p id="locationText">Locating...</p>
        <span class="loc-meta" id="locationMeta">Waiting for GPS permission</span>
      </section>

      <footer class="footer-tag">© 2026 ProjectZ SOS by BlueBug</footer>
    </main>

    <div class="action-panel" id="actionPanel" aria-hidden="true">
      <div class="action-sheet">
        <h2>Emergency actions</h2>
        <div class="action-buttons">
          <button type="button" class="action-btn call" id="callNowBtn">CALL NOW</button>
          <button type="button" class="action-btn sms" id="sendSmsBtn">SEND SMS</button>
          <button type="button" class="action-btn close" id="cancelActionsBtn">CANCEL</button>
        </div>
      </div>
    </div>
  </section>

  <script>
    const sosTrigger = document.getElementById('sosTrigger');
    const sosStatus = document.getElementById('sosStatus');
    const sosZone = document.querySelector('.sos-zone');
    const locationText = document.getElementById('locationText');
    const locationMeta = document.getElementById('locationMeta');
    const actionPanel = document.getElementById('actionPanel');
    const footerTag = document.querySelector('.footer-tag');
    const callNowBtn = document.getElementById('callNowBtn');
    const sendSmsBtn = document.getElementById('sendSmsBtn');
    const cancelActionsBtn = document.getElementById('cancelActionsBtn');

    const SOS_SMS_NUMBER = '+918700523035';
    const SOS_CALL_NUMBER = '+918700523035';

    let currentCoords = null;
    let currentAddressLabel = null;
    let holdTimer = null;
    let holdTick = null;
    let isSending = false;
    let activePointerId = null;
    let triggerCompleted = false;
    let bestAccuracyMeters = null;
    let lockStartedAtMs = 0;
    let gpsLockFinalized = false;
    let gpsLockTimeoutTimer = null;
    let clearActiveWatch = null;
    let lastReverseLookupMs = 0;

    const HOLD_MS = 3000;
    const TARGET_LOCK_ACCURACY_METERS = 5;
    const GPS_LOCK_MAX_WAIT_MS = 45000;
    const GPS_LOCK_MAX_WAIT_ONLINE_MS = 65000;

    const buildMessage = () => {
      const coordsText = currentCoords
        ? `${currentCoords.lat.toFixed(5)}, ${currentCoords.lon.toFixed(5)}`
        : 'Coordinates unavailable';
      const addressText = currentAddressLabel || coordsText;
      const mapLink = currentCoords
        ? `https://maps.google.com/?q=${currentCoords.lat},${currentCoords.lon}`
        : 'Map unavailable';

      return [
        'HELP! I am in emergency (native offline mode)',
        `Address: ${addressText}`,
        `Coordinates: ${coordsText}`,
        `Map: ${mapLink}`
      ].join('\n');
    };

    const triggerSms = async () => {
      const phoneNumber = String(SOS_SMS_NUMBER || '').replace(/[^+\d]/g, '');
      if (!phoneNumber) {
        return;
      }

      const smsBody = encodeURIComponent(buildMessage());
      const ua = navigator.userAgent || '';
      const isAndroid = /android/i.test(ua);
      const isIOS = /iphone|ipad|ipod/i.test(ua);

      if (isAndroid) {
        const cap = window.Capacitor;
        const payload = { phone: phoneNumber, body: buildMessage() };
        try {
          if (cap?.Plugins?.DefaultComm?.openDefaultSms) {
            await cap.Plugins.DefaultComm.openDefaultSms(payload);
            return;
          }

          if (typeof cap?.nativePromise === 'function') {
            await cap.nativePromise('DefaultComm', 'openDefaultSms', payload);
            return;
          }

          window.location.href = `smsto:${phoneNumber}?body=${smsBody}`;
        } catch (_) {
          window.location.href = `smsto:${phoneNumber}?body=${smsBody}`;
        }
        return;
      }

      if (isIOS) {
        window.location.href = `sms:${phoneNumber}&body=${smsBody}`;
        return;
      }

      window.location.href = `smsto:${phoneNumber}?body=${smsBody}`;
    };

    const triggerCall = async () => {
      const phoneNumber = String(SOS_CALL_NUMBER || '').replace(/[^+\d]/g, '');
      if (!phoneNumber) {
        return;
      }

      const ua = navigator.userAgent || '';
      const isAndroid = /android/i.test(ua);
      const isIOS = /iphone|ipad|ipod/i.test(ua);

      if (isAndroid) {
        const cap = window.Capacitor;
        const payload = { phone: phoneNumber };
        try {
          if (cap?.Plugins?.DefaultComm?.openDefaultDialer) {
            await cap.Plugins.DefaultComm.openDefaultDialer(payload);
            return;
          }

          if (typeof cap?.nativePromise === 'function') {
            await cap.nativePromise('DefaultComm', 'openDefaultDialer', payload);
            return;
          }
        } catch (_) {
        }

        window.location.href = `tel:${phoneNumber}`;
        return;
      }

      if (isIOS) {
        window.location.href = `telprompt:${phoneNumber}`;
        return;
      }

      window.location.href = `tel:${phoneNumber}`;
    };

    const openActionPanel = () => {
      actionPanel?.classList.add('show');
      actionPanel?.setAttribute('aria-hidden', 'false');
      footerTag?.classList.add('hidden');
      sosStatus.textContent = 'Choose CALL NOW or SEND SMS';
    };

    const closeActionPanel = () => {
      actionPanel?.classList.remove('show');
      actionPanel?.setAttribute('aria-hidden', 'true');
      footerTag?.classList.remove('hidden');
    };

    const resetSosButton = () => {
      clearTimeout(holdTimer);
      clearInterval(holdTick);
      holdTimer = null;
      holdTick = null;
      activePointerId = null;
      triggerCompleted = false;
      closeActionPanel();
      if (!isSending) {
        sosTrigger.classList.remove('pressed');
        sosTrigger.classList.remove('live-press');
        sosTrigger.classList.remove('triggered');
        sosZone?.classList.remove('live-press');
        sosZone?.classList.remove('triggered');
        sosTrigger.textContent = 'SOS';
        sosStatus.textContent = 'Press and hold to send emergency request';
      }
    };

    const sendSos = () => {
      isSending = true;
      triggerCompleted = true;
      sosTrigger.classList.remove('pressed');
      sosTrigger.classList.remove('live-press');
      sosTrigger.classList.add('triggered');
      sosZone?.classList.remove('live-press');
      sosZone?.classList.add('triggered');
      sosTrigger.textContent = 'READY';
      sosStatus.textContent = 'Preparing emergency actions...';

      setTimeout(() => {
        isSending = false;
        openActionPanel();
      }, 1200);
    };

    const startHold = (event) => {
      event.preventDefault();
      if (!event.isPrimary) return;
      if (isSending) return;
      if (holdTimer) return;

      activePointerId = event.pointerId;
      const startedAt = Date.now();
      sosTrigger.classList.add('pressed');
      sosTrigger.classList.add('live-press');
      sosZone?.classList.add('live-press');

      if (typeof sosTrigger.setPointerCapture === 'function') {
        try {
          sosTrigger.setPointerCapture(event.pointerId);
        } catch (error) {
        }
      }

      holdTick = setInterval(() => {
        const remaining = Math.max(0, HOLD_MS - (Date.now() - startedAt));
        sosTrigger.textContent = (3 * (remaining / HOLD_MS)).toFixed(1);
        sosStatus.textContent = 'Keep holding to trigger SOS';
      }, 50);

      holdTimer = setTimeout(() => {
        clearInterval(holdTick);
        holdTick = null;
        sendSos();
      }, HOLD_MS);
    };

    const endHold = (event) => {
      if (event) event.preventDefault();
      if (event && activePointerId !== null && event.pointerId !== activePointerId) {
        return;
      }
      if (isSending) return;
      if (!holdTimer) return;
      clearTimeout(holdTimer);
      holdTimer = null;
      clearInterval(holdTick);
      holdTick = null;
      activePointerId = null;
      sosTrigger.classList.remove('pressed');
      sosTrigger.classList.remove('live-press');
      sosZone?.classList.remove('live-press');
      if (!triggerCompleted) {
        sosTrigger.classList.remove('triggered');
        sosZone?.classList.remove('triggered');
      }
      sosTrigger.textContent = 'SOS';
      sosStatus.textContent = 'Press and hold to send emergency request';
    };

    sosTrigger.addEventListener('contextmenu', (event) => event.preventDefault());
    sosTrigger.addEventListener('selectstart', (event) => event.preventDefault());
    sosTrigger.addEventListener('dragstart', (event) => event.preventDefault());
    sosTrigger.addEventListener('pointerdown', startHold);
    sosTrigger.addEventListener('pointerup', endHold);
    sosTrigger.addEventListener('pointerleave', endHold);
    sosTrigger.addEventListener('pointercancel', endHold);
    callNowBtn?.addEventListener('click', () => {
      closeActionPanel();
      sosStatus.textContent = 'Opening emergency call';
      triggerCall();
      setTimeout(() => {
        resetSosButton();
      }, 700);
    });
    sendSmsBtn?.addEventListener('click', async () => {
      closeActionPanel();
      sosStatus.textContent = 'Opening emergency SMS';
      await triggerSms();
      setTimeout(() => {
        if (document.visibilityState !== 'hidden') {
          resetSosButton();
        }
      }, 1800);
    });
    cancelActionsBtn?.addEventListener('click', () => {
      resetSosButton();
    });

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden') {
        isSending = false;
        resetSosButton();
      }
    });

    window.addEventListener('pageshow', () => {
      isSending = false;
      resetSosButton();
    });

    const stopGpsWatch = async () => {
      if (gpsLockTimeoutTimer) {
        clearTimeout(gpsLockTimeoutTimer);
        gpsLockTimeoutTimer = null;
      }

      if (clearActiveWatch) {
        try {
          await clearActiveWatch();
        } catch (error) {
        }
        clearActiveWatch = null;
      }
    };

    const reverseGeocodeOnline = async (lat, lon) => {
      if (!navigator.onLine) {
        return;
      }

      const now = Date.now();
      if (now - lastReverseLookupMs < 12000) {
        return;
      }
      lastReverseLookupMs = now;

      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 4500);

      try {
        const response = await fetch(
          `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`,
          {
            signal: controller.signal,
            headers: {
              'Accept': 'application/json'
            }
          }
        );

        if (!response.ok) {
          return;
        }

        const data = await response.json();
        const address = data?.address || {};
        const shortLabel = [
          address?.suburb || address?.neighbourhood || address?.village || address?.town || address?.city || address?.county,
          address?.state,
          address?.country
        ].filter(Boolean).join(', ');

        if (shortLabel) {
          currentAddressLabel = shortLabel;
          locationText.textContent = shortLabel;
        } else if (data?.display_name) {
          currentAddressLabel = data.display_name;
          locationText.textContent = data.display_name;
        }
      } catch (error) {
      } finally {
        clearTimeout(timer);
      }
    };

    const finalizeGpsLock = async (reason) => {
      if (gpsLockFinalized) {
        return;
      }
      gpsLockFinalized = true;

      if (reason === 'locked' && bestAccuracyMeters !== null) {
        locationMeta.textContent = `GPS locked ~${Math.round(bestAccuracyMeters)}m`;
      } else if (bestAccuracyMeters !== null) {
        locationMeta.textContent = `Best GPS ~${Math.round(bestAccuracyMeters)}m`;
      }

      await stopGpsWatch();
    };

    const applyPosition = async (position) => {
      const lat = position?.coords?.latitude;
      const lon = position?.coords?.longitude;
      if (typeof lat !== 'number' || typeof lon !== 'number') {
        fallback();
        return;
      }
      currentCoords = { lat, lon };
      if (!currentAddressLabel) {
        locationText.textContent = `${lat.toFixed(5)}, ${lon.toFixed(5)}`;
      }

      reverseGeocodeOnline(lat, lon);

      const accuracy = Number(position?.coords?.accuracy || 0);
      if (accuracy > 0) {
        if (bestAccuracyMeters === null || accuracy < bestAccuracyMeters) {
          bestAccuracyMeters = accuracy;
        }

        if (!gpsLockFinalized) {
          const elapsedSec = Math.max(0, Math.floor((Date.now() - lockStartedAtMs) / 1000));
          locationMeta.textContent = `GPS ~${Math.round(accuracy)}m • ${elapsedSec}s`;
        }

        if (accuracy <= TARGET_LOCK_ACCURACY_METERS) {
          await finalizeGpsLock('locked');
        }
      } else {
        locationMeta.textContent = 'Coordinates captured';
      }
    };

    const fallback = () => {
      locationText.textContent = 'Location unavailable currently';
      locationMeta.textContent = 'Enable location permission';
    };

    const startGpsLockTimeout = () => {
      if (gpsLockTimeoutTimer) {
        clearTimeout(gpsLockTimeoutTimer);
      }
      const timeoutMs = navigator.onLine ? GPS_LOCK_MAX_WAIT_ONLINE_MS : GPS_LOCK_MAX_WAIT_MS;
      gpsLockTimeoutTimer = setTimeout(() => {
        finalizeGpsLock('timeout');
      }, timeoutMs);
    };

    const getNativeLocation = async () => {
      const cap = window.Capacitor;
      const geo = cap?.Plugins?.Geolocation;
      if (!cap?.isNativePlatform?.() || !geo) {
        return false;
      }

      try {
        locationMeta.textContent = 'Requesting GPS permission...';
        const permissionResult = await geo.requestPermissions();
        const locationState = permissionResult?.location;
        if (locationState !== 'granted' && locationState !== 'limited') {
          fallback();
          return true;
        }

        lockStartedAtMs = Date.now();
        gpsLockFinalized = false;
        locationMeta.textContent = 'Acquiring full GPS lock...';
        startGpsLockTimeout();

        if (navigator.onLine) {
          try {
            const quickAssistPosition = await geo.getCurrentPosition({
              enableHighAccuracy: false,
              timeout: 6000,
              maximumAge: 10000
            });
            await applyPosition(quickAssistPosition);
          } catch (error) {
          }
        }

        const nativePosition = await geo.getCurrentPosition({
          enableHighAccuracy: true,
          timeout: 15000,
          maximumAge: 0
        });
        await applyPosition(nativePosition);

        if (!gpsLockFinalized) {
          const watchId = await geo.watchPosition(
            {
              enableHighAccuracy: true,
              timeout: 20000,
              maximumAge: 0
            },
            (position) => {
              if (!position) {
                return;
              }
              applyPosition(position);
            }
          );

          clearActiveWatch = async () => {
            await geo.clearWatch({ id: watchId });
          };
        }

        return true;
      } catch (error) {
        await stopGpsWatch();
        fallback();
        return true;
      }
    };

    (async () => {
      const handledByNative = await getNativeLocation();
      if (handledByNative) {
        return;
      }

      if (navigator.geolocation) {
        lockStartedAtMs = Date.now();
        gpsLockFinalized = false;
        locationMeta.textContent = 'Acquiring full GPS lock...';
        startGpsLockTimeout();

        navigator.geolocation.getCurrentPosition(async (position) => {
          await applyPosition(position);
          if (gpsLockFinalized) {
            return;
          }

          const browserWatchId = navigator.geolocation.watchPosition(
            (watchPos) => {
              applyPosition(watchPos);
            },
            () => {
            },
            {
              enableHighAccuracy: true,
              timeout: 20000,
              maximumAge: 0
            }
          );

          clearActiveWatch = async () => {
            navigator.geolocation.clearWatch(browserWatchId);
          };
        }, fallback, {
          enableHighAccuracy: true,
          timeout: 12000,
          maximumAge: 0
        });
        return;
      }

      fallback();
    })();
  </script>
</body>
</html>
