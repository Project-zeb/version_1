<!DOCTYPE html>
<html>
<head>
    <title>SurgeGuard AI - Live NGO Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { height: 100vh; width: 100%; }
        #status { position: absolute; top: 10px; left: 50px; z-index: 1000; background: white; padding: 10px; border-radius: 5px; box-shadow: 0 0 5px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <div id="status">Locating you...</div>
    <div id="map"></div>

    <!-- Contact Request Modal -->
    <div id="contactModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; padding: 20px;">
        <div style="background: white; margin: auto; margin-top: 50px; padding: 30px; border-radius: 10px; max-width: 400px; box-shadow: 0 0 20px rgba(0,0,0,0.3);">
            <h2 id="modalTitle">Request Contact Info</h2>
            <form id="contactForm">
                <div style="margin-bottom: 15px;">
                    <label style="display: block; font-weight: bold; margin-bottom: 5px;">Your Name *</label>
                    <input type="text" id="userName" required style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px;">
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; font-weight: bold; margin-bottom: 5px;">Your Phone *</label>
                    <input type="tel" id="userPhone" required style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px;">
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; font-weight: bold; margin-bottom: 5px;">Your Email</label>
                    <input type="email" id="userEmail" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px;">
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; font-weight: bold; margin-bottom: 5px;">Message/Inquiry *</label>
                    <textarea id="userMessage" required style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px; height: 100px;"></textarea>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button type="submit" style="flex: 1; padding: 10px; background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">Send Request</button>
                    <button type="button" onclick="closeModal()" style="flex: 1; padding: 10px; background: #999; color: white; border: none; border-radius: 5px; cursor: pointer;">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let selectedNGO = null;

        // Modal functions
        function closeModal() {
            document.getElementById('contactModal').style.display = 'none';
            document.getElementById('contactForm').reset();
            selectedNGO = null;
        }

        function openContactForm(ngo) {
            selectedNGO = ngo;
            document.getElementById('modalTitle').innerText = `Request Contact Info - ${ngo.name}`;
            document.getElementById('contactModal').style.display = 'block';
        }

        // Handle form submission
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            if (!selectedNGO) return;
            
            const inquiry = {
                ngoName: selectedNGO.name,
                ngoType: selectedNGO.type,
                ngoLocation: `${selectedNGO.lat}, ${selectedNGO.lon}`,
                userName: document.getElementById('userName').value,
                userPhone: document.getElementById('userPhone').value,
                userEmail: document.getElementById('userEmail').value,
                message: document.getElementById('userMessage').value,
                timestamp: new Date().toISOString()
            };

            // Send to backend
            fetch('/api/contact-request', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(inquiry)
            })
            .then(response => response.json())
            .then(data => {
                alert('✅ Your inquiry has been recorded!\n\nThe NGO will contact you at:\n' + inquiry.userPhone);
                closeModal();
            })
            .catch(error => {
                alert('❌ Error sending request. Please try again.');
                console.error(error);
            });
        });

        // Initialize map
        const map = L.map('map').setView([20.5937, 78.9629], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        const statusDiv = document.getElementById('status');

        // Ask browser for location
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(position => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;

                // Move map to user's actual location
                map.setView([lat, lon], 14);
                L.marker([lat, lon]).addTo(map).bindPopup("<b>📍 Your Location</b>").openPopup();
                
                statusDiv.innerText = "Fetching nearby NGOs...";

                // Call your Flask API
                fetch(`/api/live-ngos?lat=${lat}&lon=${lon}`)
                    .then(response => response.json())
                    .then(ngos => {
                        statusDiv.innerText = `Found ${ngos.length} facilities near you.`;
                        
                        // Drop dots (circles) for every NGO found
                        ngos.forEach(ngo => {
                            // Create a circle marker (dot)
                            const circle = L.circleMarker([ngo.lat, ngo.lon], {
                                radius: 8,
                                fillColor: '#ff7800',
                                color: '#000',
                                weight: 2,
                                opacity: 0.8,
                                fillOpacity: 0.7
                            }).addTo(map);
                            
                            // Create popup with contact options
                            let contactHTML = `
                                <div style="font-size: 12px; width: 240px;">
                                    <b style="font-size: 14px; color: #ff7800;">● ${ngo.name}</b><br>
                                    <small style="color: #666;">Type: ${ngo.type}</small><br>
                                    <small style="color: #999;">Lat: ${ngo.lat.toFixed(4)}, Lon: ${ngo.lon.toFixed(4)}</small><br><br>
                                    <b style="color: #333;">Available Actions:</b><br>
                            `;
                            
                            // Get Directions button
                            const mapsUrl = `https://maps.google.com/?q=${ngo.lat},${ngo.lon}`;
                            contactHTML += `
                                <a href="${mapsUrl}" target="_blank" style="display: block; width: 100%; padding: 8px; margin: 5px 0; background: #2196F3; color: white; text-decoration: none; text-align: center; border-radius: 3px; cursor: pointer;">
                                    📍 Get Directions
                                </a>
                            `;
                            
                            // Request Contact button
                            contactHTML += `
                                <button onclick="openContactForm({name: '${ngo.name}', type: '${ngo.type}', lat: ${ngo.lat}, lon: ${ngo.lon}})" style="width: 100%; padding: 8px; margin: 5px 0; background: #4CAF50; color: white; border: none; border-radius: 3px; cursor: pointer; font-weight: bold;">
                                    📧 Request Contact Info
                                </button>
                            `;
                            
                            // Show contact info if available
                            if (ngo.phone && ngo.phone !== 'Not available') {
                                contactHTML += `<p style="margin: 8px 0; padding: 8px; background: #f0f0f0; border-radius: 3px;">📞 <strong>${ngo.phone}</strong></p>`;
                            }
                            if (ngo.email && ngo.email !== 'Not available') {
                                contactHTML += `<p style="margin: 8px 0; padding: 8px; background: #f0f0f0; border-radius: 3px;">✉️ <a href="mailto:${ngo.email}" style="color: #2196F3; text-decoration: none;">${ngo.email}</a></p>`;
                            }
                            if (ngo.website && ngo.website !== 'Not available') {
                                contactHTML += `<p style="margin: 8px 0; padding: 8px; background: #f0f0f0; border-radius: 3px;">🌐 <a href="${ngo.website}" target="_blank" style="color: #FF9800; text-decoration: none;">Visit Website</a></p>`;
                            }
                            
                            contactHTML += `</div>`;
                            circle.bindPopup(contactHTML);
                            
                            // Open popup on click
                            circle.on('click', function() {
                                this.openPopup();
                            });
                        });
                    })
                    .catch(error => {
                        statusDiv.innerText = "Error loading NGOs.";
                        console.error(error);
                    });

            }, () => {
                statusDiv.innerText = "Location access denied. Using default location.";
            });
        } else {
            statusDiv.innerText = "Geolocation not supported by this browser.";
        }
    </script>
</body>
</html>
